		// ============================================================================
		// GENERIC OPERATION PROCESSORS
		// ============================================================================

		processIntegerComparison: function (node, operator) {
			const inputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2')

			let result = false
			switch (operator) {
				case 'gt':
					result = inputs.input1 > inputs.input2
					break
				case 'gte':
					result = inputs.input1 >= inputs.input2
					break
				case 'lt':
					result = inputs.input1 < inputs.input2
					break
				case 'lte':
					result = inputs.input1 <= inputs.input2
					break
				case 'eq':
					result = inputs.input1 === inputs.input2
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-boolean-')
		},

		processIntegerArithmetic: function (node, operator) {
			const inputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2')

			let result
			switch (operator) {
				case 'add':
					result = inputs.input1 + inputs.input2
					break
				case 'subtract':
					result = inputs.input1 - inputs.input2
					break
				case 'multiply':
					result = inputs.input1 * inputs.input2
					break
				case 'divide':
					result = inputs.input2 !== 0 ? Math.floor(inputs.input1 / inputs.input2) : 0
					break
				case 'modulo':
					// Truncated remainder (plain JS %): sign follows the dividend.
					result = inputs.input2 !== 0 ? inputs.input1 % inputs.input2 : 0
					break
				case 'random': {
					const min = Math.min(inputs.input1, inputs.input2)
					const max = Math.max(inputs.input1, inputs.input2)
					result = Math.floor(Math.random() * (max - min + 1)) + min
					break
				}
				default:
					result = 0
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-integer-')
		},

		processFloatComparison: function (node, operator) {
			const inputs = this.getFloatInputValues(node, 'float-1', 'float-2')
			const big1 = new Big(inputs.input1)
			const big2 = new Big(inputs.input2)

			let result = false
			switch (operator) {
				case 'gt':
					result = big1.gt(big2)
					break
				case 'gte':
					result = big1.gte(big2)
					break
				case 'lt':
					result = big1.lt(big2)
					break
				case 'lte':
					result = big1.lte(big2)
					break
				case 'eq':
					result = big1.eq(big2)
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-boolean-')
		},

		processFloatArithmetic: function (node, operator) {
			const inputs = this.getFloatInputValues(node, 'float-1', 'float-2')
			const big1 = new Big(inputs.input1)
			const big2 = new Big(inputs.input2)

			let result
			switch (operator) {
				case 'add':
					result = big1.plus(big2).toNumber()
					break
				case 'subtract':
					result = big1.minus(big2).toNumber()
					break
				case 'multiply':
					result = big1.times(big2).toNumber()
					break
				case 'divide':
					result = inputs.input2 !== 0 ? big1.div(big2).toNumber() : 0.0
					break
				case 'modulo':
					// Big.mod is a truncated remainder: sign follows the dividend.
					result = inputs.input2 !== 0 ? big1.mod(big2).toNumber() : 0.0
					break
				case 'random': {
					const minFloat = Math.min(inputs.input1, inputs.input2)
					const maxFloat = Math.max(inputs.input1, inputs.input2)
					const range = new Big(maxFloat).minus(minFloat)
					result = new Big(minFloat).plus(range.times(Math.random())).toNumber()
					break
				}
				default:
					result = 0.0
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-float-')
		},

		processBooleanOperation: function (node, operation) {
			const inputs = this.getBooleanInputValues(node, 'boolean-1', 'boolean-2')

			let result = false
			switch (operation) {
				case 'and':
					result = inputs.input1 && inputs.input2
					break
				case 'or':
					result = inputs.input1 || inputs.input2
					break
				case 'equal':
					result = inputs.input1 === inputs.input2
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-1')
		},

		// ============================================================================
		// NODE HANDLERS
		// ============================================================================

		getNodeHandlers: function () {
			const self = this

			return {
				end: function () {
					var exitFlowId = null

					// Pop flow call stack for depth tracking
					// Check if the popped flow is an exit route
					if (self.gameState.flowCallStack && self.gameState.flowCallStack.length > 0) {
						var flowFrame = self.popFlowCallStack()
						if (flowFrame && flowFrame.flowId && self.gameState.callStack.length > 0) {
							var flows = self.gameState.flows || []
							var flow = null
							for (var fi = 0; fi < flows.length; fi++) {
								if (flows[fi].id === flowFrame.flowId) {
									flow = flows[fi]
									break
								}
							}
							if (flow && flow.isExit) {
								exitFlowId = flowFrame.flowId
							}
						}
					}

					// Check script call stack
					if (self.gameState.callStack.length > 0) {
						// If exit flow, check if exit handle is connected in calling script BEFORE popping
						if (exitFlowId) {
							var topFrame = self.gameState.callStack[self.gameState.callStack.length - 1]
							var exitHandle = 'source-' + topFrame.returnNodeId + '-exit-' + exitFlowId
							if (!SFR.findEdgeBySourceHandle(topFrame.edges, exitHandle)) {
								// Exit handle not connected — don't exit, stay in called script
								return
							}
						}

						// Gather output variable values BEFORE popping (still in called script)
						var outputValues = {}
						var vars = self.gameState.variables
						for (var oi = 0; oi < vars.length; oi++) {
							if (vars[oi].isOutput) {
								outputValues[vars[oi].id] = { value: vars[oi].value, type: vars[oi].type }
							}
						}

						var callFrame = self.popCallStack()

						if (callFrame) {
							SFR.sfTrace('SCRIPT RETURN', '"' + callFrame.scriptPath + '"')
							// Store outputs on the RunScript node in the restored calling script
							var rsNode = SFR.findNodeById(self.gameState.nodes, callFrame.returnNodeId)
							if (rsNode) {
								if (!rsNode.data) rsNode.data = {}
								rsNode.data._outputValues = outputValues
							}

							// Route: exit handle if exit flow, otherwise default output
							var handle = exitFlowId
								? 'source-' + callFrame.returnNodeId + '-exit-' + exitFlowId
								: 'source-' + callFrame.returnNodeId + '-output'

							if (SFR.findEdgeBySourceHandle(self.gameState.edges, handle)) {
								self.processNextNode(handle)
							}
						} else {
							console.error('Failed to pop call stack')
							SFR.closeWindow()
						}
					} else {
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: null })
						self.gameState.dispatch({ type: 'SET_AUDIO', payload: null })
						self.gameState.dispatch({ type: 'SET_CHARACTER', payload: null })
						SFR.closeWindow()
					}
				},

				dialogue: function (node) {
					// Check if we're inside a loop body - dialogue nodes cannot be used in loops
					const loopContext = self.peekLoopContext()
					if (loopContext && loopContext.loopType === 'forEach') {
						self.gameState.dispatch({
							type: 'SET_ERROR',
							payload: 'Dialogue nodes can\'t be inside ForEach loops'
						})
						return
					}

					// Reconstruct unified options array from the 3 separate arrays (new format)
					// Also handles legacy format where options has optionType field
					let nodeOptions
					const hasNewFormat = node.data?.textBlocks || node.data?.elements
					if (hasNewFormat) {
						// New format: merge textBlocks, elements, options into unified array
						nodeOptions = []
						if (node.data.textBlocks) {
							node.data.textBlocks.forEach(function(tb) {
								nodeOptions.push({ ...tb, optionType: 'text' })
							})
						}
						if (node.data.elements) {
							node.data.elements.forEach(function(el) {
								nodeOptions.push({ ...el, optionType: 'input' })
							})
						}
						if (node.data.options) {
							node.data.options.forEach(function(opt) {
								nodeOptions.push(opt) // buttons have no optionType (default)
							})
						}
					} else {
						// Legacy format or empty: use options directly
						nodeOptions = node.data?.options || []
					}
					const nodeText = SFR.safeGetStringFromNodeData(node.data, 'text', SFR.DEFAULT_TEXT.NO_TEXT)
					const nodeImageReset = node.data?.imageReset || false
					const nodeAudioLoop = node.data?.audioLoop || false
					const nodeAudioReset = node.data?.audioReset || false
					const nodeAudioAdvanceOnEnd = node.data?.audioAdvanceOnEnd || false
					const nodeAudioAllowSkip = node.data?.audioAllowSkip || false

					// Check how we entered this dialogue:
					// - Via edge (processNextNode sets _enteringViaEdge): fresh entry, evaluate all inputs
					// - Direct call (processNode without edge): returning after button/input handler, use cached values
					const isFreshEntry = self.gameState._enteringViaEdge === true
					if (isFreshEntry) {
						self.gameState._enteringViaEdge = false
					}

					// Get image: evaluate fresh on new entry, use cached value when returning
					let nodeImage
					if (!isFreshEntry && node.data?._cachedImage !== undefined) {
						nodeImage = node.data._cachedImage
					} else {
						const dropdownImage = SFR.safeGetStringFromNodeData(node.data, 'image', '')
						nodeImage = self.getImageInput(node, 'image-image-ref', dropdownImage)
					}

					// Get audio: evaluate fresh on new entry, use cached value when returning
					let nodeAudio
					if (!isFreshEntry && node.data?._cachedAudio !== undefined) {
						nodeAudio = node.data._cachedAudio
					} else {
						const dropdownAudio = SFR.safeGetStringFromNodeData(node.data, 'audio', '')
						nodeAudio = self.getAudioInput(node, 'audio-audio-ref', dropdownAudio)
					}

					// Get character: evaluate fresh on new entry, use cached value when returning
					let nodeCharacter
					if (!isFreshEntry && node.data?._cachedCharacter !== undefined) {
						nodeCharacter = node.data._cachedCharacter
					} else {
						const dropdownCharacter = SFR.safeGetStringFromNodeData(node.data, 'character', '')
						nodeCharacter = self.getCharacterInput(node, 'character-character-ref', dropdownCharacter)
					}

					// Cache the evaluated values so dialogue outputs return the displayed values
					if (!node.data) node.data = {}
					node.data._cachedImage = nodeImage
					node.data._cachedAudio = nodeAudio
					node.data._cachedCharacter = nodeCharacter

					nodeOptions.forEach(function (option) {
						const edge = self.gameState.edges.find(function (e) {
							return e.target === node.id && e.targetHandle?.includes(option.id)
						})
						if (edge) {
							const sourceNode = SFR.findNodeById(self.gameState.nodes, edge.source)
							if (sourceNode) self.processBooleanChain(sourceNode)
						}
					})

					if (nodeImage && nodeImage.trim() !== '') {
						SFR.sfTrace('IMAGE', '"' + nodeImage + '"')
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: nodeImage })
					} else if (nodeImageReset) {
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: null })
					}

					const nodeAudioChannel = SFR.resolveChannelId(node.data?.audioChannel)
					if (nodeAudio && nodeAudio.trim() !== '') {
						SFR.sfTrace('AUDIO', '"' + nodeAudio + '" ch=' + nodeAudioChannel)
						self.gameState.dispatch({
							type: 'SET_AUDIO',
							channel: nodeAudioChannel,
							payload: {
								path: nodeAudio,
								loop: nodeAudioLoop,
								advanceOnEnd: nodeAudioAdvanceOnEnd,
								allowSkip: nodeAudioAllowSkip,
								channel: nodeAudioChannel,
							},
						})
					} else if (nodeAudioReset) {
						// Reset only the dialogue's selected channel — other channels keep playing
						self.gameState.dispatch({ type: 'SET_AUDIO', channel: nodeAudioChannel, payload: null })
					}
					// If no audio AND audioReset is false, keep previous audio playing (do nothing)

					if (nodeCharacter && nodeCharacter.trim() !== '') {
						SFR.loadCharacterData(nodeCharacter).then(function (characterData) {
							self.gameState.dispatch({ type: 'SET_CHARACTER', payload: characterData })
						})
					} else {
						self.gameState.dispatch({ type: 'SET_CHARACTER', payload: null })
					}

					self.gameState.dispatch({
						type: 'SET_DIALOGUE',
						payload: {
							node: node,
							rawText: nodeText,
							rawOptions: nodeOptions,
							text: nodeText,
							options: nodeOptions,
						},
					})
				},

				setBool: function (node) {
					self.updateVariable(node)
					const sourceHandle = node.id + '-1'
					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, sourceHandle)
					if (nextEdge) {

					const loopContext = self.peekLoopContext()
					if (loopContext && loopContext.loopType === 'forEach') {

						return
					}
					// Second: If we came from a dialogue, go back to re-render it

				branch: function (node) {
					let conditionValue = false

					// Use helper to find the condition edge
					const conditionEdge = self.findInputEdge(node, 'boolean-condition')

					if (conditionEdge) {
						const sourceNode = SFR.findNodeById(self.gameState.nodes, conditionEdge.source)
						if (sourceNode) {
							// Process boolean chain to ensure output values are computed
							self.processBooleanChain(sourceNode)
							// Evaluate with sourceHandle for correct dialogue input resolution
							conditionValue = self.evaluateBooleanFromNode(sourceNode, node.id, conditionEdge.sourceHandle)

					} else if (typeof node.data?.value === 'boolean') {

					SFR.sfTrace('BRANCH', node.id, 'condition=' + conditionValue)

				runScript: function (node) {
					const scriptValue = SFR.safeGetStringFromNodeData(node.data, 'value')
					if (!scriptValue.trim()) {
						console.warn('RunScript node has no script selected')
						return
					}

					const circularCheck = self.checkCircularDependency(scriptValue)
					if (circularCheck.isCircular) {
						console.error('Circular dependency detected:', circularCheck.error)
						self.gameState.dispatch({ type: 'SET_ERROR', payload: circularCheck.error })
						return
					}

					// Evaluate parameter values while still in calling script's context
					var paramValues = {}
					var si = node.data?.scriptInterface
					if (si?.parameters) {
						for (var i = 0; i < si.parameters.length; i++) {
							var p = si.parameters[i]
							var val
							if (p.isArray) {
								val = self.getArrayInput(node, p.type + '-array-param-' + p.id, p.type)
							} else {
								// Map handles bake K/V into the id (target-<rs>-map-<k>-<v>-param-<id>); other
								// types use just the type. The -param-<id> suffix is shared.
								var paramTypeSeg = p.type === 'map' ? 'map-' + p.keyType + '-' + p.valueType : p.type
								val = self.getTypedInput(node, paramTypeSeg + '-param-' + p.id, p.type)
							}
							if (val !== undefined) {
								paramValues[p.id] = { value: val, type: p.type, isArray: p.isArray }
							}
						}
					}

					SFR.sfTrace('SCRIPT CALL', '"' + scriptValue + '"')
					self.pushCallStack(node.id, paramValues)

					if (SFR.isStandalone()) {
						self.handleScriptSwitch(scriptValue)
					} else {
						window?.electron?.ipcRenderer?.send('run-script', scriptValue, self.gameState.globalVariables)
					}
				},

				randomBranch: function (node) {
					var options = node.data?.options || node.options
					if (!options || options.length === 0) {
						console.warn('randomBranch: No options defined')
						return
					}

					// Calculate total weight (resolve connected integer handles per option)
					var totalWeight = 0
					var resolvedWeights = []
					for (var i = 0; i < options.length; i++) {
						var w = self.getIntegerInput(node, 'integer-' + options[i].id, options[i].weight != null ? options[i].weight : 1)
						if (w < 0) w = 0
						resolvedWeights.push(w)
						totalWeight += w
					}

					// Pick a random value in [0, totalWeight)
					var roll = Math.random() * totalWeight
					var cumulative = 0
					var selectedOption = options[0]
					for (var j = 0; j < options.length; j++) {
						cumulative += resolvedWeights[j]
						if (roll < cumulative) {
							selectedOption = options[j]
							break
						}
					}

					var outputHandle = 'source-' + node.id + '-' + selectedOption.id
					var nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, outputHandle)
					if (nextEdge) {
						self.processNextNode(outputHandle)
					} else {
						console.warn('randomBranch: No edge connected to selected output')
					}
				},

				switchOnEnum: function (node) {
					// Get the enum value directly from the referenced variable
					const isGlobal = node.data?.isGlobal === true
					const variableArray = isGlobal ? self.gameState.globalVariables : self.gameState.variables
					const variable = SFR.findVariableByName(variableArray, node.data?.variableName)
					const enumValue = variable ? String(variable.value) : ''

					// Find output handle matching the enum value
					// The output handles are named with the enum value
					const outputHandle = 'source-' + node.id + '-' + enumValue
					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, outputHandle)

					if (nextEdge) {
						self.processNextNode(outputHandle)
					} else {
						// No matching output - could log warning or just stop
						console.warn('switchOnEnum: No output handle found for enum value "' + enumValue + '"')
					}
				},

						const firstNode = SFR.findNodeById(self.gameState.nodes, startingEdge.target)

							const errorMsg = 'Start node connects to missing node'
							console.error(errorMsg)
							self.gameState.dispatch({ type: 'SET_ERROR', payload: errorMsg })
							return
						}
						// Track flow depth for recursion protection (after validation)
						self.pushFlowCallStack(flowId)
						self.processNode(firstNode)
					} else {
						// Check if this is an exit flow (no entryFlow node - it's a termination signal)
						var flows = self.gameState.flows || []
						var flowDef = null
						for (var fIdx = 0; fIdx < flows.length; fIdx++) {
							if (flows[fIdx].id === flowId) {
								flowDef = flows[fIdx]
								break
							}
						}

						if (flowDef && flowDef.isExit) {
							// Exit flow: push onto flowCallStack so the end handler detects it,
							// then trigger end logic directly
							self.pushFlowCallStack(flowId)
							var handlers = self.getNodeHandlers()
							handlers.end()
							return
						}

						// Find the entryFlow node for this flow
						var targetNode = self.gameState.nodes.find(function (n) {
							return n.type === 'entryFlow' && n.data?.flowId === flowId
						})
						if (!targetNode) {
							const errorMsg = 'Flow "' + (node.data?.flowName || flowId) + '" not found'
							console.error(errorMsg)
							self.gameState.dispatch({ type: 'SET_ERROR', payload: errorMsg })
							return
						}
						// Track flow depth for recursion protection (after validation)
						self.pushFlowCallStack(flowId)
						// Jump to the flow
						self.processNode(targetNode)
					}

              case 'image':

                break;
              case 'audio':

                break;
              case 'string':
              default:
                newValue = this.evaluateStringFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;

          newValue = node.data.value;
        }
      } else {

      SFR.setCharacterVariableValue(characterPath, variableName, variableType, newValue);

      // If we just set the Name field and there's a current character displayed, update gameState
      if (variableName === 'Name' && this.gameState.character && this.gameState.character.characterPath) {
        // Normalize paths for comparison
        const currentPath = this.gameState.character.characterPath.toLowerCase().replace(/\//g, '\\');
        const updatedPath = characterPath.replace(/\\/g, '/').trim().replace(/^\/+/, '').toLowerCase().replace(/\//g, '\\');

          this.gameState.dispatch({

      if (variableName === 'Image' && this.gameState.character && this.gameState.character.characterPath) {
        // Normalize paths for comparison
        const currentPath = this.gameState.character.characterPath.toLowerCase().replace(/\//g, '\\');
        const updatedPath = characterPath.replace(/\\/g, '/').trim().replace(/^\/+/, '').toLowerCase().replace(/\//g, '\\');

      const variable = SFR.findVariableByName(variableArray, node.data.variableName);
      if (!variable || variable.type !== 'map') return;

      const keyType = variable.keyType || node.data.keyType;
      const valueType = variable.valueType || node.data.valueType;
      // Handle suffix mirrors per-type convention used by updateIntegerVariable etc.
      const handleSuffix = 'map-' + keyType + '-' + valueType + '-2';

      const variableNode = variableEdge ? SFR.findNodeById(this.gameState.nodes, variableEdge.source) : null;

        const newMap = this.evaluateMapFromNode(variableNode, keyType, valueType, variableEdge?.sourceHandle);

      SFR.sfTrace('VAR SET', '"' + node.data.variableName + '"', 'global=' + isGlobal, 'size=' + (variable._runtimeMap ? variable._runtimeMap.size : 0));

        this.gameState.dispatch({ type: 'UPDATE_GLOBAL_VARIABLES', payload: variableArray });

    // ============================================================================

    handleScriptSwitch: function(scriptValue) {
      const normalizedPath = scriptValue.toLowerCase().replace(/\//g, '\\');

      if (this.gameState.allScripts[normalizedPath]) {
        this.gameState.dispatch({
          type: 'SWITCH_SCRIPT',
          payload: { scriptPath: normalizedPath }

        var topFrame = this.gameState.callStack[this.gameState.callStack.length - 1];
        if (topFrame && topFrame.paramValues) {
          this.applyParameterValues(topFrame.paramValues);
        }

        const startingEdge = SFR.findEdgeBySource(this.gameState.edges, '0');
        if (startingEdge) {
          const firstNode = SFR.findNodeById(this.gameState.nodes, startingEdge.target);
          if (firstNode) {
            this.processNode(firstNode);
          } else {
            this.gameState.dispatch({ type: 'SET_ERROR', payload: 'Script is missing a Start node' });
          }
        } else {
          this.gameState.dispatch({ type: 'SET_ERROR', payload: 'Script\'s Start node is not connected' });
        }
      } else if (scriptValue.includes('.sfe')) {
        const availableScripts = Object.keys(this.gameState.allScripts).join(', ');
        this.gameState.dispatch({
          type: 'SET_ERROR',
          payload: 'Script not found: ' + scriptValue
        });
      } else {
        console.error('[SECURITY] Attempted to execute non-.sfe script:', scriptValue);

  StoryFlowEditor.prototype.initializeStandaloneMode = async function() {
    try {
      const embeddedData = window.EMBEDDED_GAME_DATA;
      this.gameState.allScripts = embeddedData.allScripts || {};

      // Apply UI styles for standalone mode
      if (embeddedData.uiStyles && window.applyUIStyles) {
        window.applyUIStyles(embeddedData.uiStyles);
      }

      // Preload assets before starting the game
      if (embeddedData.assets && SFR.preloadAssets) {
        var preloadBarFill = document.getElementById('preload-bar-fill');
        await SFR.preloadAssets(embeddedData.assets, 'assets', function(loaded, total) {
          if (preloadBarFill) preloadBarFill.style.width = Math.round((loaded / total) * 100) + '%';
        });
      }

      // Replace progress bar with "Click to start" and wait for user click
      var preloadOverlay = document.getElementById('preload-overlay');
      if (preloadOverlay) {
        // Wait for logo to reach full opacity in its pulse cycle, then stop
        var logoSvg = preloadOverlay.querySelector('svg');
        if (logoSvg) {
          await new Promise(function(resolve) {
            var startTime = Date.now();
            function checkOpacity() {
              var opacity = parseFloat(getComputedStyle(logoSvg).opacity);
              if (opacity >= 0.99 || Date.now() - startTime > 2000) {
                logoSvg.style.opacity = '1';
                logoSvg.style.animation = 'none';
                resolve();
              } else {
                requestAnimationFrame(checkOpacity);
              }
            }
            requestAnimationFrame(checkOpacity);
          });
        }

        var barTrack = document.getElementById('preload-bar-track');
        if (barTrack) {
          var clickText = document.createElement('span');
          clickText.id = 'preload-click-start';
          clickText.textContent = 'Click to Start';
          barTrack.replaceWith(clickText);
        }
        await new Promise(function(resolve) {
          preloadOverlay.style.cursor = 'pointer';
          preloadOverlay.addEventListener('click', function() {
            SFR.markUserInteraction();
            preloadOverlay.remove();
            resolve();
          });
        });
      }

      const startupData = embeddedData.startupData;
      if (startupData) {
        this.loadGameContent(
          startupData.nodes || [],
          startupData.edges || [],
          startupData.variables || [],
          embeddedData.projectName || 'StoryFlow Game',
          undefined,
          embeddedData.globalVariables || [],
          embeddedData.startupScript || '',
          startupData.flows || []

      } else {
        this.gameState.dispatch({ type: 'SET_ERROR', payload: 'No startup script found' });
      }

    }

  StoryFlowEditor.prototype.loadGameContent = function(nodes, edges, variables, projectName, contentPath, globalVariables, scriptPath, flows) {

      if (firstNode) {

  // CALL STACK MANAGEMENT

  StoryFlowEditor.prototype.checkCircularDependency = function(scriptPath) {

    }
    return { isCircular: false };

  StoryFlowEditor.prototype.pushCallStack = function(returnNodeId, paramValues) {
    const callFrame = {
      scriptPath: this.gameState.currentScriptPath,
      returnNodeId: returnNodeId,
      nodes: this.gameState.nodes.slice(),
      edges: this.gameState.edges.slice(),
      variables: this.gameState.variables.slice(),
      flows: this.gameState.flows.slice(), // Save flows
      flowCallStack: this.gameState.flowCallStack.slice(), // Save flow state
      paramValues: paramValues || null, // Store param values for the called script
    };

    // Clear flow stack for the new script
    this.gameState.flowCallStack = [];

    this.gameState.callStack.push(callFrame);

  StoryFlowEditor.prototype.popCallStack = function() {

      console.warn('Attempted to pop empty call stack');
      return null;
    }

    const callFrame = this.gameState.callStack.pop();

    // Restore flow stack from calling script
    this.gameState.flowCallStack = callFrame.flowCallStack || [];

    this.gameState.setState({
      currentScriptPath: callFrame.scriptPath,
      nodes: callFrame.nodes,
      edges: callFrame.edges,
      variables: callFrame.variables,
      flows: callFrame.flows || [],

          variable._runtimeMap = paramData.value;

    const targetNode = SFR.findNodeById(this.gameState.nodes, targetEdge.target);
    SFR.debugLog('[RT:processNextNode] edge found → target=' + targetEdge.target + ' node=' + (targetNode ? targetNode.type : 'NOT FOUND'));

    const self = this;

      // Use composite key (nodeId-optionId) to handle copied nodes with same option IDs
      const optionKey = self.gameState.currentDialogue.id + '-' + option.id;

      }

      const conditionEdge = self.findInputEdge(self.gameState.currentDialogue, 'boolean-' + option.id);

  StoryFlowEditor.prototype.handleOptionClick = function(optionId) {
    SFR.debugLog('[RT:handleOptionClick] optionId=' + optionId + ' isLoading=' + this.gameState.isLoading + ' error=' + !!this.gameState.error + ' currentDialogue=' + (this.gameState.currentDialogue ? this.gameState.currentDialogue.id : 'null'));

    // Use composite key (nodeId-optionId) to handle copied nodes with same option IDs
    const clickedOption = this.gameState.options.find(function(opt) {
      return opt.id === optionId;
    });
    if (clickedOption && clickedOption.onceOnly) {
      const optionKey = this.gameState.currentDialogue.id + '-' + optionId;
      this.gameState.clickedOnceOnlyOptions.add(optionKey);
      // Trigger immediate re-render to hide the option even if dialogue doesn't change
      this.gameState.notifyListeners();
    }

    SFR.debugLog('[RT:handleOptionClick] sourceHandle=' + sourceHandle);

  /**
   * Handle input value changes for input options

   * @param {string|number} value - The parsed input value
   * @param {string} inputType - The input type ('string', 'integer', 'float')
   */
  StoryFlowEditor.prototype.handleInputValueChange = function(optionId, value, inputType) {
    if (this.gameState.isLoading || !this.gameState.currentDialogue) return;

    const self = this;
    const nodeId = this.gameState.currentDialogue.id;

    // Store the input value on the dialogue node for evaluators to access
    if (!this.gameState.currentDialogue.data) {
      this.gameState.currentDialogue.data = {};
    }
    if (!this.gameState.currentDialogue.data.inputOptionValues) {
      this.gameState.currentDialogue.data.inputOptionValues = {};
    }
    this.gameState.currentDialogue.data.inputOptionValues[optionId] = {
      value: value,
      type: inputType
    };

    // Value output handle format: source-{nodeId}-{inputType}-value-{optionId}
    const valueHandleId = SFR.buildValueHandleId(nodeId, inputType, optionId);

    // Find edge connected to the value output handle
    const valueEdge = this.gameState.edges.find(function(edge) {
      return edge.sourceHandle && edge.sourceHandle.includes(valueHandleId);
    });

    // Note: We do NOT directly update SET node variables here.
    // SET nodes should only update variables when executed via their flow input (On Click).
    // The value is stored in inputOptionValues and will be retrieved by evaluators
    // when the SET node is actually executed.

    // For conversion nodes connected to the Value output, process the chain
    if (valueEdge) {
      const targetNode = SFR.findNodeById(this.gameState.nodes, valueEdge.target);

      if (targetNode) {
        // Only process conversion/operation nodes, NOT SET nodes
        // SET nodes will get the value when executed via flow
        const isSetNode = targetNode.type === 'setString' || targetNode.type === 'setInt' ||
                          targetNode.type === 'setFloat' || targetNode.type === 'setEnum' ||
                          targetNode.type === 'setBool';

        if (!isSetNode) {
          // For conversion nodes, etc., process the chain
          this.processInputValueChain(targetNode, valueEdge);
        }

        // Update text display directly without full re-render (to preserve input focus)
        this.updateTextDisplayOnly();

        // Update debug UI if available (without full state dispatch)
      }
    }
  };

  /**
   * Process a chain of nodes starting from a conversion/operation node
   * Updates variables through the chain without navigating
   * @param {Object} node - The current node to process
   * @param {Object} sourceEdge - The edge that led to this node
   * @param {Set} visited - Set of visited node IDs to prevent infinite loops
   */
  StoryFlowEditor.prototype.processInputValueChain = function(node, sourceEdge, visited) {
    if (!node) return;

    // Initialize visited set on first call, check for cycles
    visited = visited || new Set();
    if (visited.has(node.id)) {
      console.warn('Cycle detected in input value chain at node:', node.id);
      return;
    }
    visited.add(node.id);

    var outputValue;
    var outputType;

    // Evaluate the node based on its type
    switch (node.type) {
      // String conversions
      case 'stringToInt':
        outputValue = this.evaluateIntegerFromNode(node);

        break;
      case 'stringToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      // Integer conversions
      case 'intToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'intToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      case 'intToBoolean':
        outputValue = this.evaluateBooleanFromNode(node);
        outputType = 'boolean';
        break;
      // Float conversions
      case 'floatToInt':
        outputValue = this.evaluateIntegerFromNode(node);
        outputType = 'integer';
        break;
      case 'floatToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'floatToBoolean':
        outputValue = this.evaluateBooleanFromNode(node);
        outputType = 'boolean';
        break;
      // Boolean conversions
      case 'booleanToInt':
        outputValue = this.evaluateIntegerFromNode(node);
        outputType = 'integer';
        break;
      case 'booleanToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      // Enum conversions
      case 'enumToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'intToEnum':
        outputValue = this.evaluateEnumFromNode(node);
        outputType = 'enum';
        break;
      case 'stringToEnum':
        outputValue = this.evaluateEnumFromNode(node);
        outputType = 'enum';
        break;
      default:
        return; // Unknown node type, stop processing
    }

    // Find the output edge from this node
    var outputHandlePrefix = 'source-' + node.id + '-' + outputType;
    var outputEdge = this.gameState.edges.find(function(edge) {
      return edge.source === node.id && edge.sourceHandle && edge.sourceHandle.includes(outputHandlePrefix);
    });

    if (outputEdge) {
      var nextNode = SFR.findNodeById(this.gameState.nodes, outputEdge.target);
      if (nextNode) {
        // Do NOT directly update SET nodes - they should only execute via flow
        var isSetNode = nextNode.type === 'setString' || nextNode.type === 'setInt' ||
                        nextNode.type === 'setFloat' || nextNode.type === 'setEnum' ||
                        nextNode.type === 'setBool';

        if (!isSetNode) {
          // Continue processing the chain (pass visited set for cycle detection)
          this.processInputValueChain(nextNode, outputEdge, visited);
        }
        // SET nodes will retrieve the converted value when executed via flow
      }
    }
  };

  /**
   * Update only the text display with re-interpolated variables
   * Called during input changes to avoid full re-render
   */
  StoryFlowEditor.prototype.updateTextDisplayOnly = function() {
    const allVariables = [].concat(this.gameState.globalVariables || []).concat(this.gameState.variables || []);
    const charvarDataMap = SFR.buildCharvarDataMap(allVariables);
    const interpolatedText = this.gameState.rawText ? SFR.interpolateVariables(this.gameState.rawText, allVariables, this.gameState.character, charvarDataMap) : this.gameState.text;
    if (this._typewriter.active) {
      // Update target text but keep animating from current position
      this._typewriter.targetText = interpolatedText;
    } else {
      this.textDisplay.textContent = interpolatedText;
    }
  };

  // ============================================================================
  // TYPEWRITER EFFECT
  // ============================================================================

  StoryFlowEditor.prototype._typewriterStop = function() {
    if (this._typewriter.intervalId !== null) {
      clearInterval(this._typewriter.intervalId);
      this._typewriter.intervalId = null;
    }
    // Clean up deferred start listener (standalone mode)
    if (this._typewriter._deferredListener) {
      document.removeEventListener('click', this._typewriter._deferredListener);
      document.removeEventListener('keydown', this._typewriter._deferredListener);
      document.removeEventListener('touchstart', this._typewriter._deferredListener);
      this._typewriter._deferredListener = null;
    }
    this._typewriter.active = false;
    this._typewriter.queue = [];
    this._typewriter.queueIndex = -1;
    this._typewriter._savedQueue = null;
    this._typewriter.currentElement = null;
    this._typewriter.currentItemText = '';
    this._typewriter.delayingOptions = false;
    this._typewriter._charSpans = null;
  };

  StoryFlowEditor.prototype._typewriterComplete = function() {
    if (!this._typewriter.active) return;
    // Save references before stop clears them
    var targetText = this._typewriter.targetText;
    var queue = this._typewriter._savedQueue || [];
    var wasDelaying = this._typewriter.delayingOptions;
    var charSpans = this._typewriter._charSpans;
    this._typewriterStop();
    // Reveal all main text character spans
    if (charSpans) {
      for (var cs = 0; cs < charSpans.length; cs++) {
        charSpans[cs].style.visibility = 'visible';
      }
    }
    // Reveal all queued text block character spans
    for (var i = 0; i < queue.length; i++) {
      var el = this.optionsContainer.querySelector('[data-option-id="' + queue[i].id + '"]');
      if (el) {
        var spans = el.querySelectorAll('span');
        for (var si = 0; si < spans.length; si++) { spans[si].style.visibility = 'visible'; }
      }
    }
    // Show non-text options now that all text is complete
    if (wasDelaying) {
      var items = this.optionsContainer.children;
      for (var j = 0; j < items.length; j++) {
        if (!items[j].classList.contains('text-option') && !items[j].classList.contains('click-to-advance')) {
          items[j].classList.remove('hidden');
        }
      }
    }
    // Restore scrolling and scroll to bottom so the player sees the end of text + options
    this.textDisplay.style.overflowY = '';
    this.textDisplay.scrollTop = this.textDisplay.scrollHeight;
  };

  StoryFlowEditor.prototype._typewriterAdvanceQueue = function() {
    var self = this;
    var queue = this._typewriter.queue;

    // Find next text block in queue
    while (this._typewriter.queueIndex < queue.length - 1) {
      this._typewriter.queueIndex++;
      var item = queue[this._typewriter.queueIndex];
      var el = this.optionsContainer.querySelector('[data-option-id="' + item.id + '"]');
      if (el && item.text) {
        // Animate this text block
        this._typewriter.currentIndex = 0;
        this._typewriter.currentElement = el;
        this._typewriter.currentItemText = item.text;
        var tbCharSpans = el.querySelectorAll('span');

        var intervalMs = 1000 / (SFR.typewriterSpeed || 30);
        this._typewriter.intervalId = setInterval(function() {
          if (self._typewriter.currentIndex < tbCharSpans.length) {
            tbCharSpans[self._typewriter.currentIndex].style.visibility = 'visible';
          }
          self._typewriter.currentIndex++;
          if (self._typewriter.currentIndex >= tbCharSpans.length) {
            clearInterval(self._typewriter.intervalId);
            self._typewriter.intervalId = null;
            self._typewriterAdvanceQueue();
          }
        }, intervalMs);
        return;
      }
    }

    // No more items — typewriter fully done
    this._typewriter.active = false;
    this._typewriter._savedQueue = null;
    this._typewriter.currentElement = null;
    this._typewriter.currentItemText = '';
    // Restore scrolling now that all text is visible
    this.textDisplay.style.overflowY = '';
    this._typewriterShowDelayedOptions();
  };

  StoryFlowEditor.prototype._typewriterShowDelayedOptions = function() {
    if (!this._typewriter.delayingOptions) return;
    this._typewriter.delayingOptions = false;
    // Remove hidden class from non-text option elements
    var items = this.optionsContainer.children;
    for (var i = 0; i < items.length; i++) {
      if (!items[i].classList.contains('text-option') && !items[i].classList.contains('click-to-advance')) {
        items[i].classList.remove('hidden');
      }
    }
  };

  StoryFlowEditor.prototype._typewriterStart = function(text, textBlockItems) {
    var self = this;
    this._typewriterStop();

    if (!text && (!textBlockItems || textBlockItems.length === 0)) return;

    this._typewriter.active = true;
    this._typewriter.targetText = text || '';
    this._typewriter.currentIndex = 0;
    this._typewriter.startTime = Date.now();
    this._typewriter.queue = textBlockItems || [];
    this._typewriter.queueIndex = -1;
    this._typewriter._savedQueue = textBlockItems || [];

    // Disable scrolling during typewriter animation so the user can't scroll
    // past invisible characters. Restored when typewriter finishes or is skipped.
    this.textDisplay.style.overflowY = 'hidden';
    this.textDisplay.scrollTop = 0;

    // Wrap each character in a hidden span for progressive reveal
    // Layout is always based on the full text — no reflow or word-jumping
    if (text) {
      var html = '';
      for (var ci = 0; ci < text.length; ci++) {
        var ch = text[ci];
        if (ch === '<') ch = '&lt;';
        else if (ch === '>') ch = '&gt;';
        else if (ch === '&') ch = '&amp;';
        else if (ch === '\n') { html += '<br>'; continue; }
        html += '<span style="visibility:hidden">' + ch + '</span>';
      }
      this.textDisplay.innerHTML = html;
      this._typewriter._charSpans = this.textDisplay.querySelectorAll('span');
    }

    // Hide non-text options during typewriter if configured
    // Don't hide the whole container — text blocks need to be visible for their own typewriter
    this._typewriter.delayingOptions = SFR.typewriterDelayOptions;

    // In standalone mode, wait for user interaction before starting animation
    if (SFR.isStandalone() && !SFR.hasUserInteracted) {
      var onInteract = function() {
        document.removeEventListener('click', onInteract);
        document.removeEventListener('keydown', onInteract);
        document.removeEventListener('touchstart', onInteract);
        self._typewriter._deferredListener = null;
        if (self._typewriter.active) {
          self._typewriter.startTime = Date.now();
          self._typewriterBeginAnimation();
        }
      };
      this._typewriter._deferredListener = onInteract;
      document.addEventListener('click', onInteract);
      document.addEventListener('keydown', onInteract);
      document.addEventListener('touchstart', onInteract);
      return;
    }

    this._typewriterBeginAnimation();
  };

  StoryFlowEditor.prototype._typewriterBeginAnimation = function() {
    var self = this;
    var text = this._typewriter.targetText;

    // If no main text, skip straight to text blocks (defer to let DOM render)
    if (!text) {
      setTimeout(function() { self._typewriterAdvanceQueue(); }, 0);
      return;
    }

    var intervalMs = 1000 / (SFR.typewriterSpeed || 30);
    var charSpans = this._typewriter._charSpans;
    this._typewriter.intervalId = setInterval(function() {
      if (charSpans && self._typewriter.currentIndex < charSpans.length) {
        charSpans[self._typewriter.currentIndex].style.visibility = 'visible';
        // Auto-scroll to keep the current character visible (scrollTop works
        // even with overflow:hidden, without showing a scrollbar)
        var spanRect = charSpans[self._typewriter.currentIndex].getBoundingClientRect();
        var containerRect = self.textDisplay.getBoundingClientRect();
        if (spanRect.bottom > containerRect.bottom) {
          self.textDisplay.scrollTop += (spanRect.bottom - containerRect.bottom);
        }
      }
      self._typewriter.currentIndex++;

      if (!charSpans || self._typewriter.currentIndex >= charSpans.length) {
        clearInterval(self._typewriter.intervalId);
        self._typewriter.intervalId = null;
        // Leave spans in place to avoid kerning flicker — all are visible now
        // Main text done — advance to text block queue
        self._typewriterAdvanceQueue();
      }
    }, intervalMs);
  };

  // ============================================================================
  // UI RENDERING
  // ============================================================================

  StoryFlowEditor.prototype.render = function(state) {
    const self = this;

    if (state.projectName) {
      document.title = state.projectName;
    }

    // Track if background changed this render (for sync with character)
    var bgChangedThisRender = false;
    if (state.backgroundImage !== this.currentBackgroundImage) {
      bgChangedThisRender = true;
      this.currentBackgroundImage = state.backgroundImage;
    }

    // Per-channel audio reconciliation. Each channel's playback lifecycle
    // is independent — different channels can play simultaneously, same-channel
    // changes still stop the previous element via playDialogueAudio's pause guard.
    var byChannel = state.currentAudioByChannel || {};
    var channels = SFR.audioChannels || [];
    for (var ci = 0; ci < channels.length; ci++) {
      var channel = channels[ci].id;
      var cur = byChannel[channel];
      if (cur !== this.currentPlayingAudioByChannel[channel]) {
        var audioPath = cur?.path || null;
        var audioLoop = cur?.loop || false;
        var audioAdvanceOnEnd = cur?.advanceOnEnd || false;

        // advanceOnEnd only triggers from the dialogue's OWN channel
        var onAudioEnded = null;
        if (audioAdvanceOnEnd && !audioLoop) {
          (function(channelClosure) {
            onAudioEnded = function() {
              // Scope advance to the dialogue's own channel so stale audio ending on a
              // background channel can't advance an unrelated dialogue. Channel
              // resolution is delegated to SFR.resolveAudioAdvanceHandle (unit-tested
              // in audio-channels-advance-on-end-scope.test.ts).
              var handle = SFR.resolveAudioAdvanceHandle(
                self.gameState.currentDialogue,
                self.gameState.currentAudioByChannel,
                self.gameState.edges,
                channelClosure
              );
              if (!handle) return;
              if (self._typewriter.active) self._typewriterComplete();
              self.processNextNode(handle);
            };
          })(channel);
        }

        SFR.playDialogueAudio(audioPath, audioLoop, onAudioEnded, channel).catch(function(error) {
          console.error('Error playing audio on channel ' + channel + ':', error);
        });
        this.currentPlayingAudioByChannel[channel] = cur;
      }
    }

    const characterRow = document.getElementById('character-row');
    const characterImage = document.getElementById('character-image');
    const characterName = document.getElementById('character-name');

    if (characterRow && characterImage && characterName) {
      if (state.character && state.character.name) {
        characterName.textContent = state.character.name;
        characterRow.classList.add('visible');

        if (state.character.imageDataUrl) {
          if (characterImage.src !== state.character.imageDataUrl) {
            characterImage.onload = function() {
              characterImage.classList.add('loaded');
            };
            characterImage.src = state.character.imageDataUrl;
          }
          characterImage.classList.remove('hidden');
        } else {
          characterImage.classList.add('hidden');
          characterImage.classList.remove('loaded');
        }
      } else {
        characterRow.classList.remove('visible');
        characterImage.classList.add('hidden');
        characterImage.classList.remove('loaded');
        characterImage.src = '';
        characterName.textContent = '';
      }
    }

    // Draw background AFTER character src is set, so both submit to compositor together
    if (bgChangedThisRender) {
      SFR.setBodyBackgroundImage(state.backgroundImage).catch(function(error) {
        console.error('Error applying background image:', error);
      });
    }

    const allVariables = [].concat(state.globalVariables || []).concat(state.variables || []);
    const charvarDataMap = SFR.buildCharvarDataMap(allVariables);

    // Skip text/options rendering if the current dialogue belongs to a different script
    // (e.g., during RunScript execution where Set* nodes trigger renders with wrong variables)
    var dialogueInCurrentScript = !state.currentDialogue || !state.nodes || state.nodes.some(function(n) { return n.id === state.currentDialogue.id; });
    if (!dialogueInCurrentScript) return;

    // Handle error bar display and visible options (cached to avoid double evaluation)
    var visibleOptions = [];

    if (state.error) {
      this.errorMessage.textContent = state.error;
      this.errorBar.classList.remove('hidden');
      this.textDisplay.textContent = '';
      this._typewriterStop();
    } else {
      this.errorBar.classList.add('hidden');
      visibleOptions = this.getVisibleOptions();
      SFR.debugLog('[RT:render] dialogueId=' + (state.currentDialogue ? state.currentDialogue.id : 'null') + ' visibleOptions=' + visibleOptions.length + ' totalOptions=' + (state.options ? state.options.length : 0) + ' isLoading=' + state.isLoading);

      // Text display shows dialogue text (error is in error bar now)
      const interpolatedText = state.rawText
        ? SFR.interpolateVariables(state.rawText, allVariables, state.character, charvarDataMap)
        : state.text;

      // Typewriter: start animation on fresh dialogue entry
      var currentDV = this.gameState._dialogueVersion || 0;
      var isFreshDialogue = currentDV !== this._lastDialogueVersion;
      if (isFreshDialogue) {
        this._lastDialogueVersion = currentDV;
        // Reset scroll position to top when entering a new dialogue
        this.textDisplay.scrollTop = 0;
      }

      // Collect visible text block items for typewriter queue
      var textBlockItems = [];
      if (SFR.typewriterEnabled && isFreshDialogue) {
        for (var ti = 0; ti < visibleOptions.length; ti++) {
          if (visibleOptions[ti].optionType === 'text' && visibleOptions[ti].text) {
            textBlockItems.push({
              id: visibleOptions[ti].id,
              text: SFR.interpolateVariables(visibleOptions[ti].text, allVariables, state.character, charvarDataMap)
            });
          }
        }
      }

      if (SFR.typewriterEnabled && isFreshDialogue && (interpolatedText || textBlockItems.length > 0)) {
        this._typewriterStart(interpolatedText, textBlockItems);
      } else if (isFreshDialogue) {
        // New dialogue but typewriter disabled or empty text
        this._typewriterStop();
        this.textDisplay.textContent = interpolatedText;
      } else if (this._typewriter.active) {
        // Same dialogue, typewriter still running — update target text and rebuild spans
        if (this._typewriter.targetText !== interpolatedText) {
          this._typewriter.targetText = interpolatedText;
          var revealedCount = this._typewriter.currentIndex;
          var html = '';
          for (var ri = 0; ri < interpolatedText.length; ri++) {
            var rch = interpolatedText[ri];
            if (rch === '<') rch = '&lt;';
            else if (rch === '>') rch = '&gt;';
            else if (rch === '&') rch = '&amp;';
            else if (rch === '\n') { html += '<br>'; continue; }
            html += '<span style="visibility:' + (ri < revealedCount ? 'visible' : 'hidden') + '">' + rch + '</span>';
          }
          this.textDisplay.innerHTML = html;
          this._typewriter._charSpans = this.textDisplay.querySelectorAll('span');
        }
      } else {
        // Same dialogue, no typewriter — just update text
        this.textDisplay.textContent = interpolatedText;
      }
    }
    this.textDisplay.className = 'mb-5';

    // Save focused input state before rebuild
    var focusedOptionId = null;
    var focusedCursorPos = 0;
    var focusedInput = this.optionsContainer.querySelector('input:focus');
    if (focusedInput) {
      focusedOptionId = focusedInput.getAttribute('data-option-id');
      focusedCursorPos = focusedInput.selectionStart || 0;
    }

    this.optionsContainer.innerHTML = '';

    visibleOptions.forEach(function(option, index) {
      const interpolatedOptionText = option.text ? SFR.interpolateVariables(option.text, allVariables, state.character, charvarDataMap) : option.text;
      if (option.optionType === 'text') {
        // Create simple text element for text options (no interaction)
        var textElement = document.createElement('p');
        textElement.className = 'text-option';
        // If typewriter is active and this text block is in the queue, reserve height but start empty
        var twQueueItem = self._typewriter.active && self._typewriter.queue && self._typewriter.queue.find(function(q) { return q.id === option.id; });
        textElement.setAttribute('data-option-id', option.id);
        if (twQueueItem) {
          // Render full text as hidden character spans for height reservation
          var tbHtml = '';
          for (var tci = 0; tci < twQueueItem.text.length; tci++) {
            var tch = twQueueItem.text[tci];
            if (tch === '<') tch = '&lt;';
            else if (tch === '>') tch = '&gt;';
            else if (tch === '&') tch = '&amp;';
            else if (tch === '\n') { tbHtml += '<br>'; continue; }
            tbHtml += '<span style="visibility:hidden">' + tch + '</span>';
          }
          textElement.innerHTML = tbHtml;
          self.optionsContainer.appendChild(textElement);
        } else {
          textElement.textContent = interpolatedOptionText;
          self.optionsContainer.appendChild(textElement);
        }
      } else if (option.optionType === 'input') {
        var inputType = option.inputType || 'string';
        var optionKey = state.currentDialogue.id + '-' + option.id;

        if (inputType === 'boolean') {
          // Create container for text + checkbox on same row
          var container = document.createElement('div');
          container.className = 'boolean-input-container';
          container.setAttribute('data-option-id', option.id);

          // Text label - only create if there's non-empty text
          if (interpolatedOptionText && interpolatedOptionText.trim()) {
            var label = document.createElement('span');
            label.className = 'boolean-input-label';
            label.textContent = interpolatedOptionText;
            container.appendChild(label);
          }

          // Checkbox
          var checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'boolean-input-checkbox';
          checkbox.disabled = state.isLoading;
          checkbox.setAttribute('aria-label', interpolatedOptionText ? 'Input ' + (index + 1) + ': ' + interpolatedOptionText : 'Checkbox input ' + (index + 1));

          // Restore previous value if any
          if (self.gameState.inputValues[optionKey] !== undefined) {
            checkbox.checked = self.gameState.inputValues[optionKey] === true || self.gameState.inputValues[optionKey] === 'true';
          }

          checkbox.addEventListener('change', function(e) {
            var value = e.target.checked;

            // Store the value
            self.gameState.inputValues[optionKey] = value;

            // Find and update connected variable via value output handle
            self.handleInputValueChange(option.id, value, 'boolean');

            // Trigger On Change event - execute any connected node
            var onChangeHandle = 'source-' + state.currentDialogue.id + '-' + option.id;
            self.processNextNode(onChangeHandle);
          });

          container.appendChild(checkbox);
          self.optionsContainer.appendChild(container);
        } else if (inputType === 'enum') {
          // Create dropdown for enum input
          var container = document.createElement('div');
          container.className = 'enum-input-container';
          container.setAttribute('data-option-id', option.id);

          // Text label - only create if there's non-empty text
          if (interpolatedOptionText && interpolatedOptionText.trim()) {
            var label = document.createElement('span');
            label.className = 'enum-input-label';
            label.textContent = interpolatedOptionText;
            container.appendChild(label);
          }

          // Get enum values from referenced variable
          var enumVariableName = option.enumVariableName;
          var enumIsGlobal = option.enumIsGlobal;
          var enumVariable = null;
          var enumError = null;

          if (!enumVariableName) {
            enumError = 'No enum variable selected';
          } else {
            var variablesArray = enumIsGlobal ? state.globalVariables : state.variables;
            enumVariable = variablesArray.find(function(v) {
              return v.name === enumVariableName && v.type === 'enum';
            });
            if (!enumVariable) {
              enumError = 'Variable "' + enumVariableName + '" not found';
            } else if (!enumVariable.enumValues || enumVariable.enumValues.length === 0) {
              enumError = 'No values defined for "' + enumVariableName + '"';
            }
          }

          var enumValues = (enumVariable && enumVariable.enumValues) || [];

          // Show error state if there's a problem with the enum configuration
          if (enumError) {
            var errorSpan = document.createElement('span');
            errorSpan.className = 'enum-input-error';
            errorSpan.textContent = enumError;
            container.appendChild(errorSpan);
            self.optionsContainer.appendChild(container);
            // Skip further processing for this option
            return;
          }

          // Custom dropdown element
          var dropdown = document.createElement('div');
          dropdown.className = 'enum-input-dropdown';
          dropdown.setAttribute('data-option-id', option.id);

          var trigger = document.createElement('div');
          trigger.className = 'enum-input-trigger';

          var triggerText = document.createElement('span');
          triggerText.className = 'enum-input-trigger-text';

          var triggerArrow = document.createElement('span');
          triggerArrow.className = 'enum-input-trigger-arrow';
          triggerArrow.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

          trigger.appendChild(triggerText);
          trigger.appendChild(triggerArrow);
          dropdown.appendChild(trigger);

          var optionsList = document.createElement('div');
          optionsList.className = 'enum-input-options';

          enumValues.forEach(function(val) {
            var optEl = document.createElement('div');
            optEl.className = 'enum-input-option';
            optEl.textContent = val;
            optEl.addEventListener('click', function(e) {
              e.stopPropagation();
              triggerText.textContent = val;
              dropdown.classList.remove('open');
              self.gameState.inputValues[optionKey] = val;
              self.handleInputValueChange(option.id, val, 'enum');
              var onChangeHandle = 'source-' + state.currentDialogue.id + '-' + option.id;
              self.processNextNode(onChangeHandle);
              // Update selected state
              optionsList.querySelectorAll('.enum-input-option').forEach(function(o) { o.classList.remove('selected'); });
              optEl.classList.add('selected');
            });
            optionsList.appendChild(optEl);
          });

          dropdown.appendChild(optionsList);

          // Restore previous value or default to first enum value
          var currentEnumValue;
          var needsInit = false;
          if (self.gameState.inputValues[optionKey] !== undefined) {
            currentEnumValue = self.gameState.inputValues[optionKey];
          } else if (enumValues.length > 0) {
            currentEnumValue = enumValues[0];
            self.gameState.inputValues[optionKey] = enumValues[0];
            needsInit = true;
          }
          if (currentEnumValue !== undefined) {
            triggerText.textContent = currentEnumValue;
            // Mark selected option
            optionsList.querySelectorAll('.enum-input-option').forEach(function(o) {
              if (o.textContent === currentEnumValue) o.classList.add('selected');
            });
            var existingValue = state.currentDialogue.data?.inputOptionValues?.[option.id];
            if (needsInit || !existingValue || existingValue.value !== currentEnumValue) {
              self.handleInputValueChange(option.id, currentEnumValue, 'enum');
            }
          }

          // Toggle open/close
          trigger.addEventListener('click', function(e) {
            e.stopPropagation();
            if (state.isLoading) return;
            var wasOpen = dropdown.classList.contains('open');
            // Close all other dropdowns
            document.querySelectorAll('.enum-input-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
            if (!wasOpen) dropdown.classList.add('open');
          });

          // Close on outside click
          document.addEventListener('click', function() {
            dropdown.classList.remove('open');
          });

          container.appendChild(dropdown);
          self.optionsContainer.appendChild(container);
        } else {
          // Create text input element for string/integer/float options
          var input = document.createElement('input');
          input.type = 'text';
          input.className = 'input-option';
          input.placeholder = interpolatedOptionText || '';
          input.disabled = state.isLoading;
          input.setAttribute('data-input-type', inputType);
          input.setAttribute('data-option-id', option.id);
          input.setAttribute('aria-label', 'Input ' + (index + 1) + ': ' + interpolatedOptionText);

          // Restore previous value if any (with proper formatting for floats)
          if (self.gameState.inputValues[optionKey] !== undefined) {
            var restoredValue = self.gameState.inputValues[optionKey];
            if (inputType === 'float') {
              // Format restored float value properly
              restoredValue = SFR.formatFloatDisplay(parseFloat(restoredValue) || 0);
            }
            input.value = restoredValue;
          }

          // Add input validation and handling
          input.addEventListener('input', function(e) {
            var value = e.target.value;

            if (inputType === 'integer') {
              // Only allow integer characters (digits and leading minus)
              value = value.replace(/[^0-9-]/g, '');
              // Only one minus at start
              value = value.replace(/(?!^)-/g, '');
              // Remove leading zeros
              value = SFR.removeIntegerLeadingZeros(value);
              e.target.value = value;
            } else if (inputType === 'float') {
              // Only allow float characters (digits, decimal point, leading minus)
              value = value.replace(/[^0-9.-]/g, '');
              // Only one minus at start
              value = value.replace(/(?!^)-/g, '');
              // Only one decimal point
              var parts = value.split('.');
              if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
              }
              // Remove leading zeros
              value = SFR.removeFloatLeadingZeros(value);
              e.target.value = value;
            }

            // Store the value
            self.gameState.inputValues[optionKey] = value;

            // Parse value based on type for variable updates
            var parsedValue;
            if (inputType === 'integer') {
              parsedValue = parseInt(value, 10) || 0;
            } else if (inputType === 'float') {
              parsedValue = parseFloat(value) || 0.0;
            } else {
              parsedValue = value;
            }

            // Find and update connected variable via value output handle
            self.handleInputValueChange(option.id, parsedValue, inputType);

            // Trigger On Change event - execute any connected node
            var onChangeHandle = 'source-' + state.currentDialogue.id + '-' + option.id;
            self.processNextNode(onChangeHandle);
          });

          // Add blur handler for number formatting
          if (inputType === 'float') {
            input.addEventListener('blur', SFR.createFloatBlurHandler({
              inputValues: self.gameState.inputValues,
              optionKey: optionKey,
              onValueChange: function(val) { self.handleInputValueChange(option.id, val, inputType); }
            }));
          } else if (inputType === 'integer') {
            input.addEventListener('blur', SFR.createIntegerBlurHandler({
              inputValues: self.gameState.inputValues,
              optionKey: optionKey,
              onValueChange: function(val) { self.handleInputValueChange(option.id, val, inputType); }
            }));
          }

          self.optionsContainer.appendChild(input);
        }
      } else {
        // Create button element for button options
        var button = document.createElement('button');
        button.className = '';
        button.disabled = state.isLoading;
        button.setAttribute('aria-label', 'Option ' + (index + 1) + ': ' + interpolatedOptionText);

        var span = document.createElement('span');
        span.className = '';
        span.textContent = interpolatedOptionText;
        button.appendChild(span);

        button.addEventListener('click', function() {
          SFR.debugLog('[RT:buttonClick] clicked optionId=' + option.id + ' text=' + interpolatedOptionText);
          self.handleOptionClick(option.id);
        });
        self.optionsContainer.appendChild(button);
      }
    });

    // Hide non-text options while typewriter is active and delayOptions is on
    if (this._typewriter.active && this._typewriter.delayingOptions) {
      var optItems = this.optionsContainer.children;
      for (var oi = 0; oi < optItems.length; oi++) {
        if (!optItems[oi].classList.contains('text-option')) {
          optItems[oi].classList.add('hidden');
        }
      }
    }

    // Restore focus to previously focused input
    if (focusedOptionId) {
      var inputToFocus = this.optionsContainer.querySelector('input[data-option-id="' + focusedOptionId + '"]');
      if (inputToFocus) {
        inputToFocus.focus();
        // Restore cursor position
        if (inputToFocus.setSelectionRange) {
          var pos = Math.min(focusedCursorPos, inputToFocus.value.length);
          inputToFocus.setSelectionRange(pos, pos);
        }
      }
    }

    // Click-to-advance for dialogues without button or input options
    // Check if button/input options EXIST in the data (not just visible) - hidden ones still block click-to-advance
    // Text options don't block click-to-advance
    var allOptions = state.currentDialogue ? (state.currentDialogue.data.options || []) : [];
    var hasAnyButtonOrInputOptions = allOptions.some(function(opt) {
      return !opt.optionType || opt.optionType === 'button' || opt.optionType === 'input';
    });

    // Get the content container for click handling
    var content = document.getElementById('content');

    // Remove any existing click-to-advance handler and typewriter skip handler
    if (this._clickToAdvanceHandler) {
      content.removeEventListener('click', this._clickToAdvanceHandler);
      this._clickToAdvanceHandler = null;
    }
    if (this._typewriterSkipHandler) {
      content.removeEventListener('click', this._typewriterSkipHandler);
      this._typewriterSkipHandler = null;
    }

    // Typewriter skip-on-click handler (when typewriter is active and options have buttons/inputs)
    if (this._typewriter.active && SFR.typewriterSkipOnClick && hasAnyButtonOrInputOptions) {
      var typewriterStartTime = self._typewriter.startTime;
      this._typewriterSkipHandler = function(e) {
        // Ignore the click that triggered the navigation (same event cycle)
        if (Date.now() - typewriterStartTime < 50) return;
        // Don't skip when clicking interactive elements (buttons, inputs, etc.)
        if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select') ||
            e.target.closest('#volume-control') || e.target.closest('#debug-toggle') || e.target.closest('#debug-panel')) return;
        if (self._typewriter.active) {
          self._typewriterComplete();
          content.removeEventListener('click', self._typewriterSkipHandler);
          self._typewriterSkipHandler = null;
        }
      };
      content.addEventListener('click', this._typewriterSkipHandler);
    }

    // Only enable click-to-advance if NO button/input options exist at all (not just hidden by conditions)
    // AND the header output handle is actually connected to something
    if (!hasAnyButtonOrInputOptions && state.currentDialogue) {
      var ctaDialogueId = state.currentDialogue.id;
      var headerOutputHandle = 'source-' + ctaDialogueId + '-';

      // Check if header output handle is connected to an edge
      var hasHeaderConnection = this.gameState.edges.some(function(edge) {
        return edge.sourceHandle === headerOutputHandle;
      });

      // Check if audio advance-on-end is active (has audio, advance-on-end enabled, not looping)
      // Resolve the current dialogue's audio channel id via SFR.resolveChannelId
      var rawChannel = state.currentDialogue && state.currentDialogue.data && state.currentDialogue.data.audioChannel;
      var dialogueChannel = SFR.resolveChannelId(rawChannel);
      var dialogueAudio = dialogueChannel && state.currentAudioByChannel[dialogueChannel];
      var audioAdvanceOnEndActive = dialogueAudio && dialogueAudio.advanceOnEnd && !dialogueAudio.loop;
      var audioAllowSkip = audioAdvanceOnEndActive && dialogueAudio.allowSkip;

      if (hasHeaderConnection) {
        // When audio advance-on-end is active and skip is NOT allowed, don't add click handler or indicator
        if (!audioAdvanceOnEndActive || audioAllowSkip) {
          this._clickToAdvanceHandler = function(e) {
            // Same checks as handleOptionClick
            if (self.gameState.isLoading) return;
            if (self.gameState.error) {
              self.gameState.dispatch({ type: 'CLEAR_ERROR' });
            }

            // Don't advance if clicking on excluded elements
            if (e.target.closest('#volume-control') ||
                e.target.closest('#debug-toggle') ||
                e.target.closest('#debug-panel') ||
                e.target.closest('input') ||
                e.target.closest('select') ||
                e.target.closest('button')) {
              return;
            }

            // If typewriter is active, first click completes text, second click advances
            if (self._typewriter.active && SFR.typewriterSkipOnClick) {
              // Ignore the click that triggered the navigation (same event cycle)
              if (Date.now() - self._typewriter.startTime < 50) return;
              self._typewriterComplete();
              return;
            }

            // Stop audio when skipping via click (only when advance-on-end with allow-skip)
            if (audioAllowSkip && dialogueChannel) {
              // Skip only the dialogue's own channel — other channels (e.g. background music) keep playing
              var skipEl = SFR.currentAudioElements[dialogueChannel];
              if (skipEl) {
                skipEl.pause();
                skipEl.currentTime = 0;
                SFR.currentAudioElements[dialogueChannel] = null;
              }
            }

            // Advance using header output handle (empty optionId)
            self.processNextNode(headerOutputHandle);
          };
          content.addEventListener('click', this._clickToAdvanceHandler);

          // Add "Click to advance..." indicator
          var advanceIndicator = document.createElement('p');
          advanceIndicator.className = 'click-to-advance' + (SFR.clickToAdvanceAnimEnabled === false ? ' no-animation' : '');
          advanceIndicator.textContent = SFR.clickToAdvanceText || 'Click to advance...';
          this.optionsContainer.appendChild(advanceIndicator);
        }
      }
    }

  };

  // ============================================================================
  // MIX IN METHODS FROM OTHER MODULES
  // ============================================================================

  // Mix in evaluator methods
  if (SFR.EvaluatorMethods) {
    Object.keys(SFR.EvaluatorMethods).forEach(function(key) {
      StoryFlowEditor.prototype[key] = SFR.EvaluatorMethods[key];
    });
  }

  // Mix in node handler methods
  if (SFR.NodeHandlerMethods) {
    Object.keys(SFR.NodeHandlerMethods).forEach(function(key) {
      StoryFlowEditor.prototype[key] = SFR.NodeHandlerMethods[key];
    });
  }

  // Mix in variable methods
  if (SFR.VariableMethods) {
    Object.keys(SFR.VariableMethods).forEach(function(key) {
      StoryFlowEditor.prototype[key] = SFR.VariableMethods[key];
    });
  }

  // ============================================================================
  // EXPORTS
  // ============================================================================

  // Export StoryFlowEditor class
  SFR.StoryFlowEditor = StoryFlowEditor;

  // Also expose on window for backward compatibility
  window.StoryFlowEditor = StoryFlowEditor;

  // ============================================================================
  // INITIALIZATION
  // ============================================================================

  // Initialize the game when page loads
  document.addEventListener('DOMContentLoaded', function() {
    window.storyFlowGameInstance = new StoryFlowEditor();
  });

})(window.StoryFlowRuntime);


</script>
