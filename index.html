  --sfui-btn-bg: var(--dark1);

  --sfui-btn-font-size: 0.9rem;

  --sfui-btn-text-transform: none;

/* Scaling viewport — fills screen, clips overflow */
#viewport {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

#options-container button {
  font-family: var(--sfui-btn-font-family);
  background-color: var(--sfui-btn-bg);
  cursor: pointer;
  display: block;
  color: var(--sfui-btn-color);
  width: var(--sfui-btn-width);
  border: 2px solid;
  border-color: var(--sfui-btn-border);
  padding: 0.6rem 1rem 0.6rem 1rem;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-wrap: break-word;
  font-size: var(--sfui-btn-font-size);
  text-align: var(--sfui-btn-text-align);
  text-transform: var(--sfui-btn-text-transform);
  font-weight: var(--sfui-btn-font-weight);
  font-style: var(--sfui-btn-font-style);
  text-decoration: var(--sfui-btn-text-decoration);
  border-radius: var(--sfui-btn-border-radius, 0.25rem);
}

#options-container button:hover {
  color: var(--sfui-btn-hover-color);
  background-color: var(--sfui-btn-hover-bg);
  border-color: var(--sfui-btn-hover-border);
}

#content {
  position: absolute;
  top: 0;
  left: 0;
  width: calc(100% / var(--viewport-scale, 1));
  height: var(--ref-height, 1080px);
  padding: var(--sfui-container-margin, 40px);
  overflow: hidden;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center !important;
  justify-content: flex-start !important;
  transform-origin: top left;
  transform: scale(var(--viewport-scale, 1));
  box-sizing: border-box;
}

#content::before {
  content: '';
  position: absolute;

"Dialogue","text":"Hello.","options":[{"id":"0e793f7bd7904e85a6cf8a073171cc39","text":"You're... a fish."},{"id":"377fc8d5b191480cbaf638925dde182c","text":"Uhhh... hi?"},{"id":"4b29b6382c974cb08b64e845d44f5e0b","text":"[You're not about to breathe out the little oxygen you have left in an attempt to talk to a fish]"}],"image":"","imageReset":false,"character":"Characters/Fish.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":343},"zIndex":1,"measured":{"width":256,"height":343},"height":343},{"id":"377453d0278b4d0197c2e2e5967d6e2e","position":{"x":-172.5757050475851,"y":-4.5590294250995065},"type":"dialogue","data":{"title":"Dialogue","text":"","options":[{"id":"6de406822e374164a462c9af99134052","text":"..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":297},"zIndex":1,"measured":{"width":256,"height":297},"height":297},{"id":"d2a65089f48345eb811e9cd6909fe6b3","position":{"x":2164.0267000540175,"y":-867.4128091403301},"type":"dialogue","data":{"title":"Dialogue","text":"[Your determination yields results. You managed to exhaust yourself and burn through the little air you had left.]","options":[{"id":"8a39e78724e34910b69a055db61e9c0c","text":"Wait..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":237},"zIndex":1,"measured":{"width":256,"height":237},"height":237},{"id":"6a97bb4553da4a6fa699389a01f1516a","position":{"x":2514.517060819259,"y":-895.5646453463733},"type":"dialogue","data":{"title":"Dialogue","text":"[Results are results, doesn't mean they're what you wanted.]","options":[{"id":"66f3628ab9734b75866ac45d6efe3557","text":"But I..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":189},"zIndex":1,"measured":{"width":256,"height":189},"height":189},{"id":"c4b891455ab048708cc6622d4f35c144","position":{"x":2839.67076899906,"y":-964.5366440511798},"type":"dialogue","data":{"title":"Dialogue","text":"[That's where working hard gets you. Early grave. Well. Earlier grave. The situation wasn't exactly sunshine and rainbows to begin with.]","options":[{"id":"12621a7ddb524c919273a476825b597d","text":"If you'd just let me..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":261},"zIndex":1,"measured":{"width":256,"height":261},"height":261},{"id":"e817987495f94dbe8f90129acd944b15","position":{"x":3142.3030082140267,"y":-963.1290522408776},"type":"dialogue","data":{"title":"Dialogue","text":"[Annoying when someone is just being stubborn for no reason isn't it?]","options":[{"id":"80bf16af0a084e2492f079a93665b340","text":"I am actively drowning, cut me some slack"},{"id":"8e4e6844ffcd429fa9fe668e5451285c","text":"[Flail your arms some more, for good measure]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":289},"zIndex":1,"measured":{"width":256,"height":289},"height":289},{"id":"8ad1cc4ae3054ac6abb02a8dcee9ff8b","position":{"x":3559.8567366205843,"y":-608.5844315550088},"type":"dialogue","data":{"title":"Dialogue","text":"[You are hopeless.]","options":[{"id":"41cc8a0b57c64472bc574939c102ed5d","text":"Clearly not. I'm still flailing."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":149},"zIndex":1,"measured":{"width":256,"height":149},"height":149},{"id":"a7b390a8acbd424ebca3659bdd9a4341","position":{"x":3489.3677490758114,"y":-1010.1900182637004},"type":"dialogue","data":{"title":"Dialogue","text":"[OK. Fine. I guess we both said some things you're going to regret. Now, is there any other course of action you'd like to take?]","options":[{"id":"e8f79d9088aa4cba8ddd1a4e440dbeca","text":"[Flail your arm a little]"},{"id":"1c17c77ac53e46159a803d801f8c5586","text":"[Shift your focus to your newfound companion]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":317},"zIndex":1,"measured":{"width":256,"height":317},"height":317},{"id":"a7e688d3ff6041adbb67f8e30d424cc9","position":{"x":3929.3878644932824,"y":-596.9528880087522},"type":"dialogue","data":{"title":"Dialogue","text":"[Nope, I'm done with you. The world goes dark and you die.]","options":[{"id":"0c5e663be00746a5bee9388997810202","text":"... guess this is the end."},{"id":"17447c1588b5460492cf6308042575cf","text":"Cool beans, now what?"},{"id":"975adffe63114caf9c80823438d3a85c","text":"I actually believe in reincarnation."}],"i 0ae23d5470a8a0fc42ad375a1fc","targetHandle":"target-e52610ae23d5470a8a0fc42ad375a1fc-"},{"source":"18e24f75d8a04f8ea5da22c754ff014d","sourceHandle":"source-18e24f75d8a04f8ea5da22c754ff014d-2c411df0e0b942de98f46ec113b99a6b","target":"e52610ae23d5470a8a0fc42ad375a1fc","targetHandle":"target-e52610ae23d5470a8a0fc42ad375a1fc-","id":"xy-edge__18e24f75d8a04f8ea5da22c754ff014dsource-18e24f75d8a04f8ea5da22c754ff014d-2c411df0e0b942de98f46ec113b99a6b-e52610ae23d5470a8a0fc42ad375a1fctarget-e52610ae23d5470a8a0fc42ad375a1fc-"}],"variables":[],"flows":[]},"allScripts":{"scripts\\script_main.sfe":{"nodes":[{"id":"0","position":{"x":-423.6851349009533,"y":1.0658141036401503e-14},"type":"start","data":{},"sourcePosition":"right","deletable":false,"measured":{"width":128,"height":40},"zIndex":1},{"id":"92a02a5e95164e40b7d9cfdfe9498ffa","position":{"x":184.20295830361795,"y":-0.32933982328531286},"type":"dialogue","data":{"title":"Dialogue","text":"[The sudden cold and damp awakens you from your daze]","options":[{"id":"4193f310fa2d43e98d9ef564baa22714","text":"What?"}],"image":"Backgrounds/Water.jpg","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":301},"zIndex":1,"measured":{"width":256,"height":301},"height":301},{"id":"f6e28d6e2b1c49559d11d7a19e43375d","position":{"x":591.17285641166,"y":2.702093309735467},"type":"dialogue","data":{"title":"Dialogue","text":"[The surface appears close enough to reach]","options":[{"id":"9f5ef2147d794ac6b81460bb42fca1ea","text":"[Try to swim for the surface]"},{"id":"0cc959afb0d74176bfe83cb29758ef0d","text":"[Ponder about starting a new life as an aquatic creature]"},{"id":"3c6347897d92419c9be98a9a4a61b21f","text":"[Try to remember how you got here]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":326},"zIndex":1,"measured":{"width":256,"height":326},"height":326},{"id":"6507b486c59b474fbd0118bf5472cb59","position":{"x":993.4991030676049,"y":-271.15326914499974},"type":"dialogue","data":{"title":"Dialogue","text":"[Try as you might, you just can't seem to start moving anywhere]","options":[{"id":"75e9d068a21c4d6e86a705b019533917","text":"[Look at your feet]"},{"id":"82f4b1bdcd194e4898e01dc3518e5334","text":"[Try harder]","onceOnly":true}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":282},"zIndex":1,"measured":{"width":256,"height":282},"height":282},{"id":"18e24f75d8a04f8ea5da22c754ff014d","position":{"x":1159.5693130459372,"y":348.33209250977035},"type":"dialogue","data":{"title":"Dialogue","text":"[It occurs to you there are plenty of aquatic mammals, most of which seem to be doing just fine. Perhaps you just found your new calling.]","options":[{"id":"2b9ac32c24a945f19da5805241fbb1dd","text":"[Put the ridiculous idea out of your head and choose life]"},{"id":"fa379e873ed344a7bab78c1605923265","text":"[Hang on, that might not be a bad idea, given the circumstances]"},{"id":"2c411df0e0b942de98f46ec113b99a6b","text":"[Consider what led your current fate]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":418},"zIndex":1,"measured":{"width":256,"height":418},"height":418},{"id":"edfc425079614e0db6644c68aa2362a6","position":{"x":1342.732816620665,"y":-676.4495130499533},"type":"dialogue","data":{"title":"Dialogue","text":"[I know it may seem silly but I really think this isn't one of those situations where you can just \"work harder\" and get to a desired result]","options":[{"id":"908f951a204346e1a7f35ba2c795cad6","text":"[Nonsence, you're just not trying hard enough]"},{"id":"8d9a5599cb2648c78bb82e4a66d1bc39","text":"[Ok fair, let's try a different approach.]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":337},"zIndex":1,"measured":{"width":256,"height":337},"height":337},{"id":"dc5b0dd8782441d688e737be75d11dbc","position":{"x":1767.11387061943,"y":-703.8935761379691},"type":"dialogue","data":{"title":"Dialogue","text":"[You flail your arms really hard, accounting for optimal surface area of your hands and lateral leg movements. It doesn't really help you, but it does seem your flailing has gained the attention of a local underwater resident]","options":[{"id":"7898920def224f5ca322416ccea90d56","text":"[Continue flailing, surely it will work. It has to.]"},{"id":"e5372221deda4303b43bf039a1261fdc","text":"[Shift your attention to your newfound companion]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":409},"zIndex":1,"measured":{"width":256,"height":409},"height":409},{"id":"40f68b2d2b6b428cb85d8302935a2fde","position":{"x":1391.1494544113211,"y":52.5380260608178},"type":"dialogue","data":{"title":"Dialogue","text":"[There's a cloud of debris floating bellow your waist, obscuring your vision. It's clear your feet are entangled in something.]","options":[],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":176},"zIndex":1,"measured":{"width":256,"height":176},"height":176},{"id":"164f8d973ea346fc85e25fbdea031a10","position":{"x":2197.110698344504,"y":-373.5055267091963},"type":"dialogue","data":{"title":"Dialogue","text":"Hello.","options":[{"id":"0e793f7bd7904e85a6cf8a073171cc39","text":"You're... a fish."},{"id":"377fc8d5b191480cbaf638925dde182c","text":"Uhhh... hi?"},{"id":"4b29b6382c974cb08b64e845d44f5e0b","text":"[You're not about to breathe out the little oxygen you have left in an attempt to talk to a fish]"}],"image":"","imageReset":false,"character":"Characters/Fish.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":343},"zIndex":1,"measured":{"width":256,"height":343},"height":343},{"id":"377453d0278b4d0197c2e2e5967d6e2e","position":{"x":-172.5757050475851,"y":-4.5590294250995065},"type":"dialogue","data":{"title":"Dialogue","text":"","options":[{"id":"6de406822e374164a462c9af99134052","text":"..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":297},"zIndex":1,"measured":{"width":256,"height":297},"height":297},{"id":"d2a65089f48345eb811e9cd6909fe6b3","position":{"x":2164.0267000540175,"y":-867.4128091403301},"type":"dialogue","data":{"title":"Dialogue","text":"[Your determination yields results. You managed to exhaust yourself and burn through the little air you had left.]","options":[{"id":"8a39e78724e34910b69a055db61e9c0c","text":"Wait..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":237},"zIndex":1,"measured":{"width":256,"height":237},"height":237},{"id":"6a97bb4553da4a6fa699389a01f1516a","position":{"x":2514.517060819259,"y":-895.5646453463733},"type":"dialogue","data":{"title":"Dialogue","text":"[Results are results, doesn't mean they're what you wanted.]","options":[{"id":"66f3628ab9734b75866ac45d6efe3557","text":"But I..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":189},"zIndex":1,"measured":{"width":256,"height":189},"height":189},{"id":"c4b891455ab048708cc6622d4f35c144","position":{"x":2839.67076899906,"y":-964.5366440511798},"type":"dialogue","data":{"title":"Dialogue","text":"[That's where working hard gets you. Early grave. Well. Earlier grave. The situation wasn't exactly sunshine and rainbows to begin with.]","options":[{"id":"12621a7ddb524c919273a476825b597d","text":"If you'd just let me..."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":261},"zIndex":1,"measured":{"width":256,"height":261},"height":261},{"id":"e817987495f94dbe8f90129acd944b15","position":{"x":3142.3030082140267,"y":-963.1290522408776},"type":"dialogue","data":{"title":"Dialogue","text":"[Annoying when someone is just being stubborn for no reason isn't it?]","options":[{"id":"80bf16af0a084e2492f079a93665b340","text":"I am actively drowning, cut me some slack"},{"id":"8e4e6844ffcd429fa9fe668e5451285c","text":"[Flail your arms some more, for good measure]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":289},"zIndex":1,"measured":{"width":256,"height":289},"height":289},{"id":"8ad1cc4ae3054ac6abb02a8dcee9ff8b","position":{"x":3559.8567366205843,"y":-608.5844315550088},"type":"dialogue","data":{"title":"Dialogue","text":"[You are hopeless.]","options":[{"id":"41cc8a0b57c64472bc574939c102ed5d","text":"Clearly not. I'm still flailing."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":149},"zIndex":1,"measured":{"width":256,"height":149},"height":149},{"id":"a7b390a8acbd424ebca3659bdd9a4341","position":{"x":3489.3677490758114,"y":-1010.1900182637004},"type":"dialogue","data":{"title":"Dialogue","text":"[OK. Fine. I guess we both said some things you're going to regret. Now, is there any other course of action you'd like to take?]","options":[{"id":"e8f79d9088aa4cba8ddd1a4e440dbeca","text":"[Flail your arm a little]"},{"id":"1c17c77ac53e46159a803d801f8c5586","text":"[Shift your focus to your newfound companion]"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":317},"zIndex":1,"measured":{"width":256,"height":317},"height":317},{"id":"a7e688d3ff6041adbb67f8e30d424cc9","position":{"x":3929.3878644932824,"y":-596.9528880087522},"type":"dialogue","data":{"title":"Dialogue","text":"[Nope, I'm done with you. The world goes dark and you die.]","options":[{"id":"0c5e663be00746a5bee9388997810202","text":"... guess this is the end."},{"id":"17447c1588b5460492cf6308042575cf","text":"Cool beans, now what?"},{"id":"975adffe63114caf9c80823438d3a85c","text":"I actually believe in reincarnation."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":310},"zIndex":1,"measured":{"width":256,"height":310},"height":310},{"id":"18aaa09918b042d7906a713d5e55879f","position":{"x":4219.9668955997595,"y":-649.967555836665},"type":"end","data":{},"zIndex":1,"measured":{"width":128,"height":40}},{"id":"08779db2749e4cfe8a01adcf24dc3d87","position":{"x":4373.555930437871,"y":-597.1844685225251},"type":"dialogue","data":{"title":"Dialogue","text":"[What do you mean \"now what?\", you're dead.]","options":[{"id":"54784107e9a1499b8098204ca2be4984","text":"And yet, we are talking."},{"id":"141ba58f49de4b6f9ba2504db452c722","text":"Only in the metaphysical sense."},{"id":"92c5bc9a3703432a835e78a1a74ce3d5","text":"Oh. Guess I am."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":286},"zIndex":1,"measured":{"width":256,"height":286},"height":286},{"id":"bb0b9623ce3e49ca9eb62769d804a3b3","position":{"x":4755.101700397176,"y":-350.8238054131812},"type":"end","data":{},"zIndex":1,"measured":{"width":128,"height":40}},{"id":"021f686e6bff404a8bdefee51fb043c6","position":{"x":4204.858461548182,"y":-197.8663027227583},"type":"dialogue","data":{"title":"Dialogue","text":"[Oh good! Turns out you were right, there is another life waiting for you!]","options":[{"id":"b80c87122717453b8ca62350756b492c","text":"Yay!"},{"id":"ecd0a26d13044f8c8503e3e85adc9ac9","text":"... I don't think I like your tone."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":249},"zIndex":1,"measured":{"width":256,"height":249},"height":249},{"id":"8f6a4a9a3c0e4187b5760d05ce4559ef","position":{"x":4725.866912813561,"y":-979.5143020667771},"type":"dialogue","data":{"title":"Dialogue","text":"[... fine, I guess we are. So uhhh... I'll admit I don't know exactly what to do here.]","options":[{"id":"997d780cfccb4947a6cf728fbab5a06f","text":"I don't know, we could just... chill?"},{"id":"8df290e5f2d340f4bb514df02ddaa252","text":"You know I'd quite like a second chance."},{"id":"bcb66e536dbb49fca0bf644af1fc9146","text":"I think I'm gonna go, this is a bit awkward."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":350},"zIndex":1,"measured":{"width":256,"height":350},"height":350},{"id":"ba60d90e483d4323bde759a8b25d03f8","position":{"x":4722.1522557558965,"y":-579.2600041032981},"type":"dialogue","data":{"title":"Dialogue","text":"","options":[],"image":""},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140}},{"id":"ecf8771bba0e4b159b089ac1bd2578c2","position":{"x":5125.192546512624,"y":-588.5466467474623},"type":"dialogue","data":{"title":"Dialogue","text":"[You're not just going to do the same choices again to see if something changes, right?]","options":[{"id":"8a27d81c9edb45958bce162447145ea7","text":"No. [Honest]"},{"id":"e2d7a56150c84ca883721f7258883d4b","text":"No. [Lie]"},{"id":"15a86820103b4d97ae5efed450ca6066","text":"I might."}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":310},"zIndex":1,"measured":{"width":256,"height":310},"height":310},{"id":"5afd85bfe79c41a59f6d21ffe014f310","position":{"x":5447.439046265124,"y":-578.3313398388816},"type":"dialogue","data":{"title":"Dialogue","text":"[Hmmm... I guess I don't really have anything to lose.]","options":[{"id":"484cf4c1266145bda838557eb4377aad","text":"Wohoo, here's to second chances."},{"id":"84cdd5562f0b438292b84d959ff1a22e","text":"On second thought, what are my other options?"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":245},"zIndex":1,"measured":{"width":256,"height":245},"height":245},{"id":"8f19e4ab289c44159a1a9ecd35d718fb","position":{"x":5821.777076707839,"y":-447.614901608935},"type":"dialogue","data":{"title":"Dialogue","text":"[Just this.]","options":[{"id":"232db6b3afdb4df693df65e3598429f3","text":"Just what?"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":149},"zIndex":1,"measured":{"width"   /**

  function GameState() {
    this.nodes = [];

    this.text = '';
    this.rawText = '';
    this.options = [];
    this.rawOptions = [];
    this.projectName = '';

    this.error = null;
    this.listeners = [];
    this.allScripts = {};
    this.currentScriptPath = '';

    this.currentAudioByChannel = {};
    this.character = null;
    this.callStack = [];
    this.flows = []; // Current script's flows (for exit route detection)

  GameState.prototype.setState = function(newState) {
    Object.assign(this, newState);
    this.notifyListeners();
  };

  GameState.prototype.subscribe = function(listener) {
    const self = this;
    this.listeners.push(listener);
    return function() {
      self.listeners = self.listeners.filter(function(l) {
        return l !== listener;

  };

  GameState.prototype.notifyListeners = function() {
    const self = this;
    // Batch multiple state changes into a single render per frame

    this._renderScheduled = true;
    requestAnimationFrame(function() {
      self._renderScheduled = false;
      self.listeners.forEach(function(listener) {
        listener(self);
      });

  GameState.prototype.dispatch = function(action) {
    SFR.debugLog('[RT:dispatch] action=' + action.type);
    switch (action.type) {
      case 'LOAD_CONTENT': {

        this.setState(inflatedPayload);

          // Without this, variable values from a previous call persist into the next call.
          // Inflate after the JSON round-trip since Maps don't survive JSON serialization.
          this.setState({
            nodes: scriptData.nodes || [],
            edges: scriptData.edges || [],
            variables: SFR.inflateMapVariables(JSON.parse(JSON.stringify(scriptData.variables || []))),
            flows: scriptData.flows || [],
            currentScriptPath: action.payload.scriptPath,

        break;
      }

      case 'SET_DIALOGUE':
        // Only increment version when entering a different dialogue node (not re-rendering the same one)
        if (!this.currentDialogue || this.currentDialogue.id !== action.payload.node.id) {
          this._dialogueVersion = (this._dialogueVersion || 0) + 1;
        }
        SFR.debugLog('[RT:SET_DIALOGUE] nodeId=' + action.payload.node.id + ' options=' + (action.payload.options ? action.payload.options.length : 0) + ' text=' + (action.payload.text || '').substring(0, 80));
        this.setState({
          currentDialogue: action.payload.node,
          text: action.payload.text,
          options: action.payload.options,
          rawText: action.payload.rawText || action.payload.text,

        break;

        break;

      case 'CLEAR_ERROR':
        this.setState({ error: null });
        break;

        break;

            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const moduloInput1 = moduloInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, moduloInput1Edge.source), node.id, moduloInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const moduloInput2 = moduloInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, moduloInput2Edge.source), node.id, moduloInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          // Truncated remainder (plain JS %): sign follows the dividend.
          return moduloInput2 !== 0 ? moduloInput1 % moduloInput2 : 0;
        }

        case 'random': {
          const randomInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const randomInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const randomFrom = randomInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, randomInput1Edge.source), node.id, randomInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const randomTo = randomInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, randomInput2Edge.source), node.id, randomInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          const minRand = Math.min(randomFrom, randomTo);
          const maxRand = Math.max(randomFrom, randomTo);
          return Math.floor(Math.random() * (maxRand - minRand + 1)) + minRand;
        }

        case 'floatToInt': {
          const floatInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-');
          });
          if (floatInputEdge) {
            const floatSourceNode = SFR.findNodeById(this.gameState.nodes, floatInputEdge.source);
            const floatValue = floatSourceNode ? this.evaluateFloatFromNode(floatSourceNode, node.id, floatInputEdge.sourceHandle) : 0.0;
            return Math.round(floatValue);
          }
          return 0;
        }

        case 'booleanToInt': {
          const boolToIntInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-');
          });
          if (boolToIntInputEdge) {
            const boolSourceNode = SFR.findNodeById(this.gameState.nodes, boolToIntInputEdge.source);
            const boolValue = boolSourceNode ? this.evaluateBooleanFromNode(boolSourceNode, node.id, boolToIntInputEdge.sourceHandle) : false;
            return boolValue ? 1 : 0;
          }
          return 0;
        }

        case 'stringToInt': {
          const stringToIntInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');
          });
          if (stringToIntInputEdge) {
            const strSourceNode = SFR.findNodeById(this.gameState.nodes, stringToIntInputEdge.source);
            const stringValue = strSourceNode ? this.evaluateStringFromNode(strSourceNode, node.id, stringToIntInputEdge.sourceHandle) : '';
            return parseInt(stringValue, 10) || 0;
          }
          return 0;
        }

        case 'lengthString': {
          const lengthInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');
          });
          if (lengthInputEdge) {
            const lengthSourceNode = SFR.findNodeById(this.gameState.nodes, lengthInputEdge.source);
            const lengthStringValue = lengthSourceNode ? this.evaluateStringFromNode(lengthSourceNode, node.id, lengthInputEdge.sourceHandle) : '';
            return lengthStringValue.length;
          }
          return 0;
        }

        // Array length nodes - compute directly since these are pure nodes
        case 'arrayLengthBool': {
          const boolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          return boolArr.length;
        }
        case 'arrayLengthInt': {
          const intArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          return intArr.length;
        }
        case 'arrayLengthFloat': {
          const floatArr = this.getArrayInput(node, 'float-array-1', 'float');
          return floatArr.length;
        }
        case 'arrayLengthString': {
          const strArr = this.getArrayInput(node, 'string-array-1', 'string');
          return strArr.length;
        }
        case 'arrayLengthImage': {
          const imgArr = this.getArrayInput(node, 'image-array-1', 'image');
          return imgArr.length;
        }
        case 'arrayLengthCharacter': {
          const charArr = this.getArrayInput(node, 'character-array-1', 'character');
          return charArr.length;
        }
        case 'arrayLengthAudio': {
          const audioArr = this.getArrayInput(node, 'audio-array-1', 'audio');
          return audioArr.length;
        }

        // Find in array nodes (return index) - compute directly since these are pure nodes
        case 'findInBoolArray': {
          const findBoolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          const findBoolVal = this.getBooleanInput(node, 'boolean-2', typeof node.data?.value === 'boolean' ? node.data.value : false);
          return findBoolArr.indexOf(findBoolVal);
        }
        case 'findInIntArray': {
          const findIntArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          const findIntVal = this.getIntegerInput(node, 'integer-2', typeof node.data?.value === 'number' ? node.data.value : 0);
          return findIntArr.indexOf(findIntVal);
        }
        case 'findInFloatArray': {
          const findFloatArr = this.getArrayInput(node, 'float-array-1', 'float');
          const findFloatVal = this.getFloatInput(node, 'float-2', typeof node.data?.value === 'number' ? node.data.value : 0.0);
          return findFloatArr.indexOf(findFloatVal);
        }
        case 'findInStringArray': {
          const findStrArr = this.getArrayInput(node, 'string-array-1', 'string');
          const findStrVal = this.getStringInput(node, 'string-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findStrArr.indexOf(findStrVal);
        }
        case 'findInImageArray': {
          const findImgArr = this.getArrayInput(node, 'image-array-1', 'image');
          const findImgVal = this.getImageInput(node, 'image-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findImgArr.indexOf(findImgVal);
        }
        case 'findInCharacterArray': {
          const findCharArr = this.getArrayInput(node, 'character-array-1', 'character');
          const findCharVal = this.getCharacterInput(node, 'character-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findCharArr.indexOf(findCharVal);
        }
        case 'findInAudioArray': {
          const findAudioArr = this.getArrayInput(node, 'audio-array-1', 'audio');
          const findAudioVal = this.getAudioInput(node, 'audio-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findAudioArr.indexOf(findAudioVal);
        }

        // Get integer array element - compute directly since this is a pure node
        case 'getIntArrayElement': {
          const getIntElemArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          const getIntElemIdx = this.getIntegerInput(node, 'integer-2', node.data?.index || 0);
          return (getIntElemIdx >= 0 && getIntElemIdx < getIntElemArr.length) ? getIntElemArr[getIntElemIdx] : 0;
        }

        // Map ops (pure, computed inline)
        case 'getMapValue': {
          if (node.data?.valueType !== 'integer') return 0;
          this.computeGetMapValue(node);
          return typeof node.data?._mapValueOutput === 'number' ? node.data._mapValueOutput : 0;
        }
        case 'mapSize': {
          const msKeyType = node.data?.keyType;
          const msValueType = node.data?.valueType;
          if (!msKeyType || !msValueType) return 0;
          const msMap = this.getMapInput(node, 'map-' + msKeyType + '-' + msValueType + '-1', msKeyType, msValueType);
          return msMap.size;
        }

        // Get random integer array element - return element value
        case 'getRandomIntArrayElement': {
          const randIntArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          if (randIntArr.length === 0) return 0;
          // Always generate fresh random for each evaluation
          const randIntIdx = Math.floor(Math.random() * randIntArr.length);
          return randIntArr[randIntIdx];
        }

        // ForEach loop index
        case 'forEachBoolLoop':
        case 'forEachIntLoop':
        case 'forEachFloatLoop':
        case 'forEachStringLoop':
        case 'forEachImageLoop':
        case 'forEachCharacterLoop':
        case 'forEachAudioLoop':
          // Return current index if sourceHandle indicates index output
          if (sourceHandle && sourceHandle.includes('-index')) {
            return node.data?._currentIndex || 0;
          }
          // Otherwise return element value (handled in element type evaluator)
          return node.data?.outputValue || 0;

        // forEachMap Key/Value (integer) — disambiguate via sourceHandle suffix.
        case 'forEachMap': {
          var fEMIKeyMatch = sourceHandle && sourceHandle.endsWith('-key');
          var fEMIValueMatch = sourceHandle && sourceHandle.endsWith('-value');
          if (fEMIKeyMatch && node.data?.keyType === 'integer') return parseInt(node.data._currentKey, 10) || 0;
          if (fEMIValueMatch && node.data?.valueType === 'integer') return parseInt(node.data._currentValue, 10) || 0;
          return 0;
        }

        case 'runScript': {
          if (!node.data || !node.data._outputValues) return 0;
          var outMatch = sourceHandle ? sourceHandle.match(/-out-(.+)$/) : null;
          if (!outMatch) return 0;
          var outData = node.data._outputValues[outMatch[1]];
          if (!outData) return 0;
          return parseInt(outData.value, 10) || 0;
        }

        default:
          return 0;
      }
    },

    // ============================================================================
    // FLOAT EVALUATION
    // ============================================================================

    evaluateFloatFromNode: function(node, targetNodeId, sourceHandle) {
      if (!node) return 0.0;

      var _evalResult = this._evaluateFloatFromNodeInner(node, targetNodeId, sourceHandle);
      SFR.sfTrace('EVAL', node.id, node.type, 'result=' + _evalResult);
      return _evalResult;
    },

    _evaluateFloatFromNodeInner: function(node, targetNodeId, sourceHandle) {
      if (!node) return 0.0;

      switch (node.type) {
        case 'dialogue': {
          // Get input value from dialogue option
          var inputData = SFR.getDialogueInputValue(node, targetNodeId, sourceHandle, this.gameState.edges);
          if (inputData) {
            return parseFloat(inputData.value) || 0.0;
          }
          return 0.0;
        }

        case 'getCharacterVar':
        case 'setCharacterVar': {
          if (node.data?.variableType === 'float') {
            // First check for connected character input handle, then fall back to dropdown value
            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'float'
            );
            return typeof value === 'number' ? value : 0.0;
          }
          return 0.0;
        }

        case 'getFloat':
        case 'setFloat': {
          if (SFR.isValidNodeData(node.data)) {
            const isGlobal = node.data.isGlobal === true;
            const variableArray = isGlobal ? this.gameState.globalVariables : this.gameState.variables;
            const variable = SFR.findVariableByName(variableArray, node.data.variableName);
            var floatVarVal = variable ? parseFloat(variable.value) : 0.0;
            SFR.sfTrace('VAR GET', '"' + node.data.variableName + '"', 'global=' + isGlobal, 'value=' + floatVarVal);
            return floatVarVal;
          }
          return 0.0;
        }

        case 'plusFloat': {
          const plusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const plusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const plusInput1 = plusInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, plusInput1Edge.source), node.id, plusInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const plusInput2 = plusInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, plusInput2Edge.source), node.id, plusInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(plusInput1).plus(plusInput2).toNumber();
        }

        case 'minusFloat': {
          const minusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const minusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const minusInput1 = minusInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, minusInput1Edge.source), node.id, minusInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const minusInput2 = minusInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, minusInput2Edge.source), node.id, minusInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(minusInput1).minus(minusInput2).toNumber();
        }

        case 'multiplyFloat': {
          const multiplyInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const multiplyInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const multiplyInput1 = multiplyInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput1Edge.source), node.id, multiplyInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const multiplyInput2 = multiplyInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput2Edge.source), node.id, multiplyInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(multiplyInput1).times(multiplyInput2).toNumber();
        }

        case 'divideFloat': {
          const divideInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const divideInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const divideInput1 = divideInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, divideInput1Edge.source), node.id, divideInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const divideInput2 = divideInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, divideInput2Edge.source), node.id, divideInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return divideInput2 !== 0 ? new Big(divideInput1).div(divideInput2).toNumber() : 0.0;
        }

        case 'moduloFloat': {
          const moduloInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const moduloInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const moduloInput1 = moduloInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, moduloInput1Edge.source), node.id, moduloInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const moduloInput2 = moduloInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, moduloInput2Edge.source), node.id, moduloInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          // Big.mod is a truncated remainder: sign follows the dividend.
          return moduloInput2 !== 0 ? new Big(moduloInput1).mod(moduloInput2).toNumber() : 0.0;
        }

        case 'randomFloat': {
          const randomInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const randomInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const randomFrom = randomInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, randomInput1Edge.source), node.id, randomInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const randomTo = randomInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, randomInput2Edge.source), node.id, randomInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          const minRand = Math.min(randomFrom, randomTo);
          const maxRand = Math.max(randomFrom, randomTo);
          // Use Big for range calculation to maintain precision
          const range = new Big(maxRand).minus(minRand);
          return new Big(minRand).plus(range.times(Math.random())).toNumber();
        }

        case 'intToFloat': {
          const intInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-');
          });
          if (intInputEdge) {
            const intSourceNode = SFR.findNodeById(this.gameState.nodes, intInputEdge.source);
            const intValue = intSourceNode ? this.evaluateIntegerFromNode(intSourceNode, node.id, intInputEdge.sourceHandle) : 0;
            return parseFloat(intValue.toString());
          }
          return 0.0;
        }

        case 'booleanToFloat': {
          const boolToFloatInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-');
          });
          if (boolToFloatInputEdge) {
            const boolSourceNode = SFR.findNodeById(this.gameState.nodes, boolToFloatInputEdge.source);
            const boolValue = boolSourceNode ? this.evaluateBooleanFromNode(boolSourceNode, node.id, boolToFloatInputEdge.sourceHandle) : false;
            return boolValue ? 1.0 : 0.0;
          }
          return 0.0;
        }

        case 'stringToFloat': {
          const stringToFloatInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');
          });
          if (stringToFloatInputEdge) {
            const strSourceNode = SFR.findNodeById(this.gameState.nodes, stringToFloatInputEdge.source);
            const stringValue = strSourceNode ? this.evaluateStringFromNode(strSourceNode, node.id, stringToFloatInputEdge.sourceHandle) : '';
            return parseFloat(stringValue) || 0.0;
          }
          return 0.0;
        }

        // Get float array element - compute directly since this is a pure node
        case 'getFloatArrayElement': {
          const getFloatElemArr = this.getArrayInput(node, 'float-array-1', 'float');
          const getFloatElemIdx = this.getIntegerInput(node, 'integer-2', node.data?.index || 0);
          return (getFloatElemIdx >= 0 && getFloatElemIdx < getFloatElemArr.length) ? getFloatElemArr[getFloatElemIdx] : 0.0;
        }

        // Map ops (pure, computed inline)
        case 'getMapValue': {
          if (node.data?.valueType !== 'float') return 0.0;
          this.computeGetMapValue(node);
          return typeof node.data?._mapValueOutput === 'number' ? node.data._mapValueOutput : 0.0;
        }

        // Get random float array element - return element value
        case 'getRandomFloatArrayElement': {
          const randFloatArr = this.getArrayInput(node, 'float-array-1', 'float');
          if (randFloatArr.length === 0) return 0.0;
          const randFloatIdx = Math.floor(Math.random() * randFloatArr.length);
          return randFloatArr[randFloatIdx];
        }

        // ForEach loop element (float)
        case 'forEachFloatLoop':
          return node.data?.outputValue || 0.0;

        // forEachMap Key/Value (float) — keyType can't be 'float' per spec
        // (only string/integer/enum), so the isKey branch is unreachable.
        // Included for symmetry with the other type evaluators.
        case 'forEachMap': {
          var fEMFKeyMatch = sourceHandle && sourceHandle.endsWith('-key');
          var fEMFValueMatch = sourceHandle && sourceHandle.endsWith('-value');
          if (fEMFKeyMatch && node.data?.keyType === 'float') return parseFloat(node.data._currentKey) || 0.0;
          if (fEMFValueMatch && node.data?.valueType === 'float') return parseFloat(node.data._currentValue) || 0.0;
          return 0.0;
        }

        case 'runScript': {
          if (!node.data || !node.data._outputValues) return 0.0;
          var outMatch = sourceHandle ? sourceHandle.match(/-out-(.+)$/) : null;
          if (!outMatch) return 0.0;
          var outData = node.data._outputValues[outMatch[1]];
          if (!outData) return 0.0;
          return parseFloat(outData.value) || 0.0;
        }

        default:
          console.warn('evaluateFloatFromNode: Unknown node type ' + node.type);
          return 0.0;
      }
    },

    // ============================================================================
    // STRING EVALUATION
    // ============================================================================

    evaluateStringFromNode: function(node, targetNodeId, sourceHandle) {
      if (!node) return '';

      var _evalResult = this._evaluateStringFromNodeInner(node, targetNodeId, sourceHandle);
      SFR.sfTrace('EVAL', node.id, node.type, 'result=' + _evalResult);
      return _evalResult;
    },

    _evaluateStringFromNodeInner: function(node, targetNodeId, sourceHandle) {
      if (!node) return '';

      switch (node.type) {
        case 'dialogue': {
          // Get input value from dialogue option
          var inputData = SFR.getDialogueInputValue(node, targetNodeId, sourceHandle, this.gameState.edges);
          if (inputData) {
            return String(inputData.value);
          }
          return '';
        }

        case 'getCharacterVar':
        case 'setCharacterVar': {
          // A getCharacterVar left at its default "String" type never persists
          // variableType, so treat an absent type as 'string' (matches the node's
          // default and the getCharacterVar handler's `|| 'string'`).
          if ((node.data?.variableType || 'string') === 'string') {
            // First check for connected character input handle, then fall back to dropdown value
            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'string'
            );
            return typeof value === 'string' ? value : '';
          }
          return '';
        }

        case 'getString':
        case 'setString': {
          if (SFR.isValidNodeData(node.data)) {
            const isGlobal = node.data.isGlobal === true;
            const variableArray = isGlobal ? this.gameState.globalVariables : this.gameState.variables;
            const variable = SFR.findVariableByName(variableArray, node.data.variableName);
            var strVarVal = variable ? String(variable.value) : '';
            SFR.sfTrace('VAR GET', '"' + node.data.variableName + '"', 'global=' + isGlobal, 'value=' + strVarVal);
            return strVarVal;
          }
          return '';
        }

        case 'intToString': {
          const intInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-');
          });
          if (intInputEdge) {
            const intSourceNode = SFR.findNodeById(this.gameState.nodes, intInputEdge.source);
            const intValue = intSourceNode ? this.evaluateIntegerFromNode(intSourceNode, node.id, intInputEdge.sourceHandle) : 0;
            return intValue.toString();
          }
          return '0';
        }

        case 'floatToString': {
          const floatInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-');
          });
          if (floatInputEdge) {
            const floatSourceNode = SFR.findNodeById(this.gameState.nodes, floatInputEdge.source);
            const floatValue = floatSourceNode ? this.evaluateFloatFromNode(floatSourceNode, node.id, floatInputEdge.sourceHandle) : 0.0;
            return floatValue.toString();
          }
          return '0';
        }

        case 'enumToString': {
          const enumInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-enum-');
          });
          if (enumInputEdge) {
            const enumSourceNode = SFR.findNodeById(this.gameState.nodes, enumInputEdge.source);
            return enumSourceNode ? this.evaluateEnumFromNode(enumSourceNode, node.id, enumInputEdge.sourceHandle) : '';
          }
          return '';
        }

        case 'concatenateString': {
          const concat1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-1');
          });
          let concatValue1;
          if (concat1Edge) {
            const concat1SourceNode = SFR.findNodeById(this.gameState.nodes, concat1Edge.source);
            concatValue1 = concat1SourceNode ? this.evaluateStringFromNode(concat1SourceNode, node.id, concat1Edge.sourceHandle) : '';
          } else {
            concatValue1 = (node.data?.value1 !== undefined ? node.data.value1 : node.value1) || '';
          }

          const concat2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-2');
          });
          let concatValue2;
          if (concat2Edge) {
            const concat2SourceNode = SFR.findNodeById(this.gameState.nodes, concat2Edge.source);

    _evaluateEnumFromNodeInner: function(node, targetNodeId, sourceHandle) {

          return '';

        case 'getCharacterVar':
        case 'setCharacterVar': {
          if (node.data?.variableType === 'enum') {
            // First check for connected character input handle, then fall back to dropdown value
            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'enum'

            return typeof value === 'string' ? value : '';
          }
          return '';
        }

        case 'getEnum':
        case 'setEnum': {
          if (SFR.isValidNodeData(node.data)) {

            const variable = SFR.findVariableByName(variableArray, node.data.variableName);

            return enumVarVal;
          }
          return '';
        }

        case 'intToEnum': {
          // Get the integer input and convert to enum using index
          const intToEnumEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-');
          });
          if (intToEnumEdge) {
            const intSourceNode = SFR.findNodeById(this.gameState.nodes, intToEnumEdge.source);
            const intValue = intSourceNode ? this.evaluateIntegerFromNode(intSourceNode, node.id, intToEnumEdge.sourceHandle) : 0;
            // Find the target variable to get enum values
            const targetEdge = this.gameState.edges.find(function(edge) {
              return edge.source === node.id && edge.sourceHandle?.includes('source-' + node.id + '-enum-');
            });
            if (targetEdge) {
              const targetNode = SFR.findNodeById(this.gameState.nodes, targetEdge.target);
              if (targetNode && targetNode.data) {
                let enumValues = [];
                // Get enum values from target node's variable
                if ((targetNode.type === 'getEnum' || targetNode.type === 'setEnum') && targetNode.data.variableName) {
                  const isGlobal = targetNode.data.isGlobal === true;
                  const variableArray = isGlobal ? this.gameState.globalVariables : this.gameState.variables;
                  const variable = SFR.findVariableByName(variableArray, targetNode.data.variableName);
                  if (variable && variable.enumValues) {
                    enumValues = variable.enumValues;
                  }
                } else if (targetNode.data.enumValues) {
                  enumValues = targetNode.data.enumValues;
                }
                if (enumValues.length > 0) {
                  // Clamp index to valid range
                  const clampedIndex = Math.max(0, Math.min(intValue, enumValues.length - 1));
                  return enumValues[clampedIndex];
                }
              }
            }
          }
          return '';
        }

        case 'stringToEnum': {
          // Get the string input and find matching enum value
          const stringToEnumEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');

          if (stringToEnumEdge) {

                if (enumValues.includes(stringValue)) {

          return '';
        }

    // ============================================================================
    // BOOLEAN CHAIN PROCESSING
    // ============================================================================

    processBooleanChain: function(node) {
      if (!node || !SFR.ALL_BOOLEAN_PRODUCERS.includes(node.type)) {
        return;
      }

      if (node.type === 'notBool') {
        if (node.data) delete node.data.outputValue;
        // Use helper to find input edge, then traverse the chain
        const inputEdge = this.findInputEdge(node, 'boolean');
        if (inputEdge) {
          const sourceNode = SFR.findNodeById(this.gameState.nodes, inputEdge.source);
          if (sourceNode) this.processBooleanChain(sourceNode);
        }
        this.processNotBoolNode(node);
      } else if (node.type === 'branch') {
        // Use helper to find condition edge
        const conditionEdge = this.findInputEdge(node, 'boolean-condition');
        if (conditionEdge) {
          const branchSourceNode = SFR.findNodeById(this.gameState.nodes, conditionEdge.source);
          if (branchSourceNode) this.processBooleanChain(branchSourceNode);
        }
      } else if (node.type === 'andBool' || node.type === 'orBool' || node.type === 'equalBool') {
        // Use helpers to find both input edges
        const input1Edge = this.findInputEdge(node, 'boolean-1');
        const input2Edge = this.findInputEdge(node, 'boolean-2');
        if (input1Edge) {
          const source1Node = SFR.findNodeById(this.gameState.nodes, input1Edge.source);
          if (source1Node) this.processBooleanChain(source1Node);
        }
        if (input2Edge) {
          const source2Node = SFR.findNodeById(this.gameState.nodes, input2Edge.source);
          if (source2Node) this.processBooleanChain(source2Node);
        }
      } else if (SFR.BOOLEAN_NODE_TYPES.INTEGER_COMPARISON.includes(node.type)) {
        const intInputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2');
        let intResult = false;
        switch (node.type) {
          case 'greaterThan':         intResult = intInputs.input1 > intInputs.input2; break;
          case 'greaterThanOrEqual':  intResult = intInputs.input1 >= intInputs.input2; break;
          case 'lessThan':            intResult = intInputs.input1 < intInputs.input2; break;
          case 'lessThanOrEqual':     intResult = intInputs.input1 <= intInputs.input2; break;
          case 'equalInt':            intResult = intInputs.input1 === intInputs.input2; break;
        }
        this.setNodeOutputValue(node, intResult);
      } else if (SFR.BOOLEAN_NODE_TYPES.FLOAT_COMPARISON.includes(node.type)) {
        const floatInputs = this.getFloatInputValues(node, 'float-1', 'float-2');
        const big1 = new Big(floatInputs.input1);
        const big2 = new Big(floatInputs.input2);

			var fallback = node.data?.value
			switch (valueType) {
				case 'boolean':
					return this.getBooleanInput(node, 'boolean-' + optionId, typeof fallback === 'boolean' ? fallback : false)
				case 'integer':
					return this.getIntegerInput(node, 'integer-' + optionId, typeof fallback === 'number' ? fallback : 0)
				case 'float':
					return this.getFloatInput(node, 'float-' + optionId, typeof fallback === 'number' ? fallback : 0.0)
				case 'enum':
					return this.getEnumInput(node, 'enum-' + optionId, typeof fallback === 'string' ? fallback : '')

				case 'character':
					return this.getCharacterInput(node, 'character-' + optionId, typeof fallback === 'string' ? fallback : '')
				case 'audio':
					return this.getAudioInput(node, 'audio-' + optionId, typeof fallback === 'string' ? fallback : '')

		computeGetMapValue: function (node) {
			if (!node.data) node.data = {}
			var keyType = node.data?.keyType
			var valueType = node.data?.valueType
			if (!keyType || !valueType) {
				node.data._mapValueOutput = SFR.getDefaultValueForType(valueType || 'string')
				node.data._mapIsValidOutput = false
				return
			}
			var map = this.getMapInput(node, 'map-' + keyType + '-' + valueType + '-1', keyType, valueType)
			var key = this.getMapOpKeyInput(node, keyType, '2')
			var found = map.has(key)
			node.data._mapValueOutput = found ? map.get(key) : SFR.getDefaultValueForType(valueType)
			node.data._mapIsValidOutput = found

		 * After mutating a map in place (via setMapValue/removeMapKey/clearMap), find

		 * updateConnectedArrayVariable. Walks back through chained map mutation ops to
		 * find the underlying getMap/setMap.

		updateConnectedMapVariable: function (node, handleSuffix) {
			var edge = this.findInputEdge(node, handleSuffix)
			if (!edge) return
			var sourceNode = SFR.findNodeById(this.gameState.nodes, edge.source)
			if (!sourceNode) return

			// Walk back through chain operations to find the underlying getMap/setMap
			while (sourceNode && (sourceNode.type === 'setMapValue' || sourceNode.type === 'removeMapKey' || sourceNode.type === 'clearMap')) {
				var chainKeyType = sourceNode.data?.keyType
				var chainValueType = sourceNode.data?.valueType
				if (!chainKeyType || !chainValueType) return
				var upstreamEdge = this.findInputEdge(sourceNode, 'map-' + chainKeyType + '-' + chainValueType + '-2')
				if (!upstreamEdge) return
				sourceNode = SFR.findNodeById(this.gameState.nodes, upstreamEdge.source)
			}

			if (sourceNode.type !== 'getMap' && sourceNode.type !== 'setMap') return

			var isGlobal = sourceNode.data.isGlobal === true
			var variableArray = isGlobal ? this.gameState.globalVariables.slice() : this.gameState.variables.slice()
			var variable = SFR.findVariableByName(variableArray, sourceNode.data.variableName)
			if (!variable || variable.type !== 'map') return

			if (isGlobal) {
				this.gameState.dispatch({ type: 'UPDATE_GLOBAL_VARIABLES', payload: variableArray })
			} else {
				this.gameState.dispatch({ type: 'UPDATE_VARIABLES', payload: variableArray })
			}
		},

		// ============================================================================
		// LOOP HELPERS
		// ============================================================================

		/**
		 * Process a forEach loop node.
		 */
		processForEachLoop: function (node, elementType) {
			if (!node.data) node.data = {}

			// Initialize loop if needed
			if (node.data._loopIndex === undefined) {
				var arr = this.getArrayInput(node, elementType + '-array', elementType)
				node.data._loopArray = arr
				node.data._loopIndex = 0
			}

			var currentIndex = node.data._loopIndex
			var loopArray = node.data._loopArray || []

			if (currentIndex < loopArray.length) {
				// Set current element and index as outputs
				var element = loopArray[currentIndex]
				SFR.sfTrace('LOOP', node.id, 'index=' + currentIndex, 'value=' + element)
				this.setNodeOutputValue(node, element)
				node.data._currentIndex = currentIndex

				// Push loop context for break support
				this.pushLoopContext(node.id, 'forEach')

				// Execute loop body
				this.processNextNode('source-' + node.id + '-loopBody')
			} else {
				// Loop completed - clean up
				delete node.data._loopIndex
				delete node.data._loopArray
				delete node.data._currentIndex
				this.processNextNode('source-' + node.id + '-completed')
			}
		},

		/**
		 * Process a forEachMap node — iterates Map entries (Key + Value) in
		 * insertion order. Mirrors processForEachLoop but pulls a JS Map via
		 * getMapInput, snapshots entries to a positional array so continueLoop
		 * can step through, and exposes _currentKey + _currentValue separately
		 * (read by per-type evaluators via sourceHandle '-key' / '-value').
		 *
		 * No Index output — explicit Unreal-style decision per spec.
		 */
		processForEachMap: function (node) {
			if (!node.data) node.data = {}
			var keyType = node.data.keyType
			var valueType = node.data.valueType
			if (!keyType || !valueType) {
				this.processNextNode('source-' + node.id + '-completed')
				return
			}

			// Initialize loop if needed — snapshot Map entries to an array so the
			// rest of the loop machinery (continueLoop, popLoopContext) can step
			// by integer index without re-iterating a Map each turn.
			if (node.data._loopIndex === undefined) {
				var map = this.getMapInput(node, 'map-' + keyType + '-' + valueType + '-map', keyType, valueType)
				var entries = []
				map.forEach(function (v, k) {
					entries.push({ key: k, value: v })
				})
				node.data._loopEntries = entries
				node.data._loopIndex = 0
			}

			var currentIndex = node.data._loopIndex
			var loopEntries = node.data._loopEntries || []

			if (currentIndex < loopEntries.length) {
				var entry = loopEntries[currentIndex]
				SFR.sfTrace('LOOP', node.id, 'index=' + currentIndex, 'key=' + entry.key, 'value=' + entry.value)
				node.data._currentKey = entry.key
				node.data._currentValue = entry.value

				// Push loop context for break support
				this.pushLoopContext(node.id, 'forEach')

				// Execute loop body
				this.processNextNode('source-' + node.id + '-loopBody')
			} else {
				// Loop completed - clean up
				delete node.data._loopIndex
				delete node.data._loopEntries
				delete node.data._currentKey
				delete node.data._currentValue
				this.processNextNode('source-' + node.id + '-completed')
			}
		},

		/**

		continueLoop: function (nodeId) {

			if (!node || node.data._loopIndex === undefined) return

			node.data._loopIndex++

			this.popLoopContext()

			this.processNode(node)

		/**

		popLoopContext: function () {

			}
			return this.gameState.loopStack.pop()

			return this.gameState.loopStack[this.gameState.loopStack.length - 1]
